<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2D Vertical Climber</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #16213e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #game-canvas { display: block; }

  /* ─── Config Panel ─── */
  #config-panel {
    position: fixed;
    left: 0; top: 0;
    width: 340px; height: 100vh;
    background: rgba(10, 10, 30, 0.92);
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(255,255,255,0.08);
    display: none;
    flex-direction: column;
    z-index: 20;
    overflow: hidden;
  }
  #config-panel.open { display: flex; }

  .cfg-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 14px 8px;
    flex-shrink: 0;
  }
  .cfg-header span:first-child {
    color: #7f8fa6;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .cfg-hint {
    color: #555;
    font-size: 9px;
    letter-spacing: 1px;
  }

  .cfg-tabs {
    display: flex;
    gap: 2px;
    padding: 0 10px;
    flex-shrink: 0;
  }
  .cfg-tab {
    flex: 1;
    padding: 6px 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    color: #7f8fa6;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .cfg-tab:hover { background: rgba(255,255,255,0.06); }
  .cfg-tab.active {
    background: rgba(232,101,43,0.12);
    border-color: rgba(232,101,43,0.4);
    color: #e8652b;
  }

  .cfg-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px 14px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .cfg-body::-webkit-scrollbar { width: 5px; }
  .cfg-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .cfg-section {
    color: #7f8fa6;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 14px 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .cfg-section:first-child { margin-top: 6px; }

  .cfg-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 4px 0;
  }
  .cfg-row label {
    flex: 0 0 95px;
    color: #8a9ab5;
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cfg-row input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
  }
  .cfg-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: #e8652b;
    border-radius: 50%;
    cursor: pointer;
  }
  .cfg-val {
    flex: 0 0 38px;
    text-align: right;
    color: #aaa;
    font-size: 10px;
    font-family: monospace;
  }

  .cfg-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 5px 0;
  }
  .cfg-toggle label {
    color: #8a9ab5;
    font-size: 10px;
    flex: 0 0 95px;
  }
  .cfg-check {
    -webkit-appearance: none;
    appearance: none;
    width: 32px; height: 16px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    outline: none;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .cfg-check:checked { background: rgba(232,101,43,0.4); }
  .cfg-check::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #666;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .cfg-check:checked::after { left: 18px; background: #e8652b; }

  .cfg-select {
    flex: 1;
    padding: 4px 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: #aaa;
    font-size: 10px;
    outline: none;
    cursor: pointer;
  }
  .cfg-select:focus { border-color: rgba(232,101,43,0.5); }
  .cfg-select option { background: #1a1a2e; color: #aaa; }

  .cfg-action-btn {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    background: rgba(136,84,208,0.15);
    border: 1px solid rgba(136,84,208,0.4);
    border-radius: 6px;
    color: #8854d0;
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .cfg-action-btn:hover { background: rgba(136,84,208,0.25); }

  .cfg-color-tool {
    margin: 6px 0;
    padding: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
  }

  #export-btn {
    margin: 8px 14px 14px;
    padding: 10px;
    background: rgba(232,101,43,0.15);
    border: 1px solid rgba(232,101,43,0.4);
    border-radius: 6px;
    color: #e8652b;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  #export-btn:hover { background: rgba(232,101,43,0.25); }

  /* ─── HUD ─── */
  #hud {
    position: fixed;
    left: 20px; top: 20px;
    color: #7f8fa6;
    font-size: 12px;
    z-index: 10;
    pointer-events: none;
    transition: left 0.3s;
  }
  #cfg-toggle-btn {
    pointer-events: all;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    padding: 5px 11px;
    background: rgba(232,101,43,0.13);
    border: 1px solid rgba(232,101,43,0.35);
    border-radius: 5px;
    color: #e8652b;
    font-size: 10px;
    font-family: 'Segoe UI', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #cfg-toggle-btn:hover { background: rgba(232,101,43,0.25); }
  #stamina-bar {
    margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  #stamina-bar-inner {
    width: 120px; height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
  }
  #stamina-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #64c8ff, #4a9eff);
    border-radius: 5px;
    transition: width 0.2s;
  }
  #health-bar {
    margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  #health-bar-inner {
    width: 120px; height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
  }
  #health-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #ff6b6b, #ee5a24);
    border-radius: 5px;
    transition: width 0.3s;
  }

  #svg-overlay {
    position: fixed;
    left: 0; top: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 5;
  }

  /* ─── Score / Orb Tracker ─── */
  #score-display {
    position: fixed;
    right: 20px; top: 20px;
    background: rgba(10,10,30,0.78);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 16px 12px;
    z-index: 10;
    pointer-events: none;
    text-align: right;
    min-width: 130px;
  }
  #score-display .sd-label {
    color: #7f8fa6; font-size: 9px;
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px;
  }
  #score-display .sd-value {
    color: #ffd700; font-size: 20px;
    font-family: monospace; font-weight: bold; line-height: 1;
  }
  #score-display .sd-orb-label { color: #aaddff; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
  #score-display .sd-orb-value { color: #aaddff; font-size: 16px; font-family: monospace; font-weight: bold; }
  #score-display .sd-goal-bar {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 5px;
  }
  #score-display .sd-goal-fill {
    height: 100%; background: linear-gradient(90deg, #aaddff, #66aaff);
    border-radius: 2px; transition: width 0.4s;
  }
  #score-display .sd-complete {
    color: #44ffaa; font-size: 9px;
    text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
    display: none;
  }

  /* ─── Keymap Overlay ─── */
  #keymap {
    position: fixed;
    right: 20px; bottom: 20px;
    background: rgba(10,10,30,0.78);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 14px 12px;
    color: #7f8fa6;
    font-size: 10px;
    pointer-events: none;
    z-index: 10;
    min-width: 160px;
  }
  #keymap .km-title {
    color: #aab0bb;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 7px;
    padding-bottom: 5px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  #keymap .km-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 3px 0;
  }
  #keymap .km-key {
    display: inline-block;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    color: #e8652b;
    font-size: 9px;
    min-width: 28px;
    text-align: center;
  }
  #keymap .km-label { color: #8a9ab5; }
</style>
</head>
<body>

<div id="hud">
  <button id="cfg-toggle-btn">&#9881; Config</button>
  <div>ARROWS: Move &nbsp; SPACE: Jump &nbsp; SHIFT: Latch/De-latch &nbsp; P: Config</div>
  <div id="stamina-bar">
    <span>STAMINA</span>
    <div id="stamina-bar-inner"><div id="stamina-fill"></div></div>
    <span id="stamina-text">100</span>
  </div>
  <div id="health-bar">
    <span>HP</span>
    <div id="health-bar-inner"><div id="health-fill"></div></div>
    <span id="health-text">5</span>
  </div>
  <div id="altitude-display" style="margin-top: 8px;">Altitude: <span id="altitude-text">0</span>m</div>
</div>

<div id="config-panel">
  <div class="cfg-header">
    <span>Config</span>
    <span class="cfg-hint">P to toggle</span>
  </div>
  <div class="cfg-tabs" id="cfg-tabs"></div>
  <div class="cfg-body" id="cfg-body"></div>
  <button id="export-btn">Export JSON</button>
</div>

<div id="score-display">
  <!-- populated by updateHUD based on itemType -->
  <div id="sd-coins" style="display:none">
    <div class="sd-label">Score</div>
    <div class="sd-value" id="score-text">0</div>
  </div>
  <div id="sd-orbs" style="display:none">
    <div class="sd-orb-label">Orbs Collected</div>
    <div class="sd-orb-value"><span id="orbs-collected">0</span> <span style="opacity:0.4">/</span> <span id="orbs-total">0</span></div>
    <div class="sd-goal-bar"><div class="sd-goal-fill" id="orb-goal-fill" style="width:0%"></div></div>
    <div class="sd-complete" id="orb-complete">&#10003; All Collected!</div>
  </div>
</div>

<div id="keymap">
  <div class="km-title">Controls</div>
  <div class="km-row"><span class="km-key">&#8592; &#8594;</span><span class="km-label">Move</span></div>
  <div class="km-row"><span class="km-key">&#8593;</span><span class="km-label">Climb / Fly</span></div>
  <div class="km-row"><span class="km-key">SPACE</span><span class="km-label">Jump / Wall Jump</span></div>
  <div class="km-row"><span class="km-key">SHIFT+&#8595;</span><span class="km-label">Drop through platform</span></div>
  <div class="km-row"><span class="km-key">SHIFT</span><span class="km-label">Latch / De-latch</span></div>
  <div class="km-row"><span class="km-key">C</span><span class="km-label">Switch wall side</span></div>
  <div class="km-row"><span class="km-key">P</span><span class="km-label">Config panel</span></div>
</div>

<svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
<canvas id="game-canvas"></canvas>

<script src="../tools/colorMaps/colorWheel.js"></script>
<script src="../tools/colorMaps/colorInput.js"></script>
<script src="../tools/colorMaps/colorSwatches.js"></script>
<script src="../tools/colorMaps/colorHarmony.js"></script>

<script type="importmap">

// ═══════════════════════════════════════════════════════════
//  LOAD CONFIGS FROM JSON
// ═══════════════════════════════════════════════════════════
async function loadConfigs() {
  const files = {
    player: 'playerClimber.json',
    obstacles: 'obstacles.json',
    climbStructure: 'climbStructure.json',
    atmosphere: 'climbAtmosphere.json',
    fx: 'climbFX.json'
  };
  for (const [key, file] of Object.entries(files)) {
    try {
      const resp = await fetch(file);
      if (resp.ok) configs[key] = { ...configs[key], ...(await resp.json()) };
    } catch (e) { /* use defaults */ }
  }
}

// ═══════════════════════════════════════════════════════════
//  PANEL STATE
// ═══════════════════════════════════════════════════════════
let panelOpen = false;
let activeTab = 'player';
const panel = document.getElementById('config-panel');
const tabsEl = document.getElementById('cfg-tabs');
const bodyEl = document.getElementById('cfg-body');
const exportBtn = document.getElementById('export-btn');
const hudEl = document.getElementById('hud');

// Config toggle button (same behaviour as pressing P)
document.getElementById('cfg-toggle-btn').addEventListener('click', () => {
  panelOpen = !panelOpen;
  panel.classList.toggle('open', panelOpen);
  hudEl.style.left = panelOpen ? '360px' : '20px';
});

// ═══════════════════════════════════════════════════════════
//  PANEL BUILDER HELPERS
// ═══════════════════════════════════════════════════════════
function addSection(parent, title) {
  const h = document.createElement('div');
  h.className = 'cfg-section';
  h.textContent = title;
  parent.appendChild(h);
}

function addSlider(parent, label, cfgPath, min, max, step, opts = {}) {
  const row = document.createElement('div');
  row.className = 'cfg-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'range';
  inp.min = min; inp.max = max; inp.step = step;
  inp.dataset.cfg = cfgPath;
  if (opts.negate) inp.dataset.negate = '1';
  
  const val = document.createElement('span');
  val.className = 'cfg-val';
  
  row.appendChild(lbl);
  row.appendChild(inp);
  row.appendChild(val);
  parent.appendChild(row);
  
  syncSlider(inp);
  // Only update the display label on input — config is written by updateFromPanel each frame
  inp.addEventListener('input', () => {
    const valSpan = inp.nextElementSibling;
    if (valSpan) valSpan.textContent = parseFloat(inp.value).toFixed(2);
  });
}

function addToggle(parent, label, cfgPath) {
  const row = document.createElement('div');
  row.className = 'cfg-toggle';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  inp.className = 'cfg-check';
  inp.dataset.cfg = cfgPath;
  
  row.appendChild(lbl);
  row.appendChild(inp);
  parent.appendChild(row);
  
  syncToggle(inp);
  // updateFromPanel handles DOM → config each frame; no reset listener needed
}

function addSelect(parent, label, cfgPath, options) {
  const row = document.createElement('div');
  row.className = 'cfg-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const sel = document.createElement('select');
  sel.className = 'cfg-select';
  sel.dataset.cfg = cfgPath;

  options.forEach((opt, i) => {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = opt;
    sel.appendChild(option);
  });

  row.appendChild(lbl);
  row.appendChild(sel);
  parent.appendChild(row);

  syncSelect(sel);
  // updateFromPanel handles DOM → config each frame; no reset listener needed
}

function addRadio(parent, label, cfgPath, options) {
  const row = document.createElement('div');
  row.className = 'cfg-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  row.appendChild(lbl);

  const group = document.createElement('div');
  group.style.cssText = 'display:flex;gap:12px;flex:1;align-items:center;';

  const path = cfgPath.split('.');
  let current = configs;
  for (const k of path) current = current[k];

  options.forEach(opt => {
    const wrap = document.createElement('label');
    wrap.style.cssText = 'display:flex;align-items:center;gap:4px;color:#8a9ab5;font-size:10px;cursor:pointer;';
    const radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = cfgPath;
    radio.value = opt.value;
    radio.dataset.cfg = cfgPath;
    radio.dataset.radioGroup = '1';
    radio.checked = (current === opt.value);
    radio.style.accentColor = '#e8652b';
    radio.addEventListener('change', () => {
      if (radio.checked) {
        const pArr = cfgPath.split('.');
        let obj = configs;
        for (let i = 0; i < pArr.length - 1; i++) obj = obj[pArr[i]];
        obj[pArr[pArr.length - 1]] = opt.value;
      }
    });
    wrap.appendChild(radio);
    wrap.appendChild(document.createTextNode(opt.label));
    group.appendChild(wrap);
  });

  row.appendChild(group);
  parent.appendChild(row);
}

function syncSlider(inp) {
  const path = inp.dataset.cfg.split('.');
  let val = configs;
  for (const p of path) val = val[p];
  if (inp.dataset.negate) val = -val;
  inp.value = val;
  const valSpan = inp.nextElementSibling;
  if (valSpan) valSpan.textContent = Number(val).toFixed(2);
}

function syncToggle(inp) {
  const path = inp.dataset.cfg.split('.');
  let val = configs;
  for (const p of path) val = val[p];
  inp.checked = val;
}

function syncSelect(sel) {
  const path = sel.dataset.cfg.split('.');
  let val = configs;
  for (const p of path) val = val[p];
  sel.value = val;
}

function updateFromPanel() {
  document.querySelectorAll('[data-cfg]').forEach(el => {
    const path = el.dataset.cfg.split('.');
    let obj = configs;
    for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
    const key = path[path.length - 1];
    
    if (el.type === 'checkbox') {
      obj[key] = el.checked;
    } else if (el.type === 'radio') {
      if (el.checked) obj[key] = el.value;
    } else if (el.type === 'range') {
      let val = parseFloat(el.value);
      if (el.dataset.negate) val = -val;
      obj[key] = val;
    } else if (el.tagName === 'SELECT') {
      obj[key] = parseInt(el.value);
    }
  });
}

}

exportBtn.onclick = () => {
  updateFromPanel();
  const exportData = {};
  
  for (const [key, config] of Object.entries(configs)) {
    const copy = JSON.parse(JSON.stringify(config));
    copy.exportedAt = new Date().toISOString();
    exportData[key] = copy;
    
    const filename = {
      player: 'playerClimber.json',
      obstacles: 'obstacles.json',
      climbStructure: 'climbStructure.json',
      atmosphere: 'climbAtmosphere.json',
      fx: 'climbFX.json'
    }[key];
    
    const blob = new Blob([JSON.stringify(copy, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }
};

// ═══════════════════════════════════════════════════════════
//  CLIMB STRUCTURE GENERATION
// ═══════════════════════════════════════════════════════════
function generateClimbSegment(yStart) {
  const cfg = configs.climbStructure.generation;
  const seg = { walls: [], platforms: [], ledges: [], crumbling: [], yStart, segHeight: cfg.segmentHeight };

  // Seed-based random
  let seed = cfg.seed + Math.floor(yStart / cfg.segmentHeight);
  const rand = () => {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  };

  // Expand width by 5% of its calculated range
  let width = cfg.minWidth + rand() * (cfg.maxWidth - cfg.minWidth);
  width *= 1.05;
  const leftX = -width / 2;
  const rightX = width / 2;

  // Left wall
  const leftGeom = new THREE.BoxGeometry(cfg.wallThickness, cfg.segmentHeight, 1);
  const leftMat = new THREE.MeshStandardMaterial({ color: getTextureColor() });
  const leftMesh = new THREE.Mesh(leftGeom, leftMat);
  leftMesh.position.set(leftX, yStart + cfg.segmentHeight / 2, 0);
  scene.add(leftMesh);
  seg.walls.push({ mesh: leftMesh, x: leftX, side: 'left' });

  // Right wall
  const rightMesh = new THREE.Mesh(leftGeom.clone(), leftMat.clone());
  rightMesh.position.set(rightX, yStart + cfg.segmentHeight / 2, 0);
  scene.add(rightMesh);
  seg.walls.push({ mesh: rightMesh, x: rightX, side: 'right' });
  
  // Gaps
  if (rand() < cfg.gapFrequency) {
    const gapY = yStart + rand() * cfg.segmentHeight;
    seg.gaps = [{ y: gapY, size: cfg.gapSize }];
  }
  
  // Platforms
  if (rand() < cfg.platformFrequency) {
    const platWidth = cfg.platformMinWidth + rand() * (cfg.platformMaxWidth - cfg.platformMinWidth);
    const platX = leftX + rand() * (rightX - leftX - platWidth);
    const platY = yStart + rand() * cfg.segmentHeight;
    
    const platGeom = new THREE.BoxGeometry(platWidth, 0.3, 1);
    const platMat = new THREE.MeshStandardMaterial({ color: getTextureColor() });
    const platMesh = new THREE.Mesh(platGeom, platMat);
    platMesh.position.set(platX + platWidth / 2, platY, 0);
    scene.add(platMesh);
    
    const isCrumbling = rand() < configs.climbStructure.crumbling.frequency && configs.climbStructure.crumbling.enabled;
    seg.platforms.push({ mesh: platMesh, x: platX, width: platWidth, y: platY, crumbling: isCrumbling, touched: false });
  }
  
  // Ledges
  if (rand() < cfg.ledgeFrequency) {
    const ledgeWidth = cfg.ledgeMinWidth + rand() * (cfg.ledgeMaxWidth - cfg.ledgeMinWidth);
    const side = rand() < 0.5 ? 'left' : 'right';
    const ledgeX = side === 'left' ? leftX : rightX - ledgeWidth;
    const ledgeY = yStart + rand() * cfg.segmentHeight;
    
    const ledgeGeom = new THREE.BoxGeometry(ledgeWidth, 0.2, 0.8);
    const ledgeMat = new THREE.MeshStandardMaterial({ color: getTextureColor() });
    const ledgeMesh = new THREE.Mesh(ledgeGeom, ledgeMat);
    ledgeMesh.position.set(ledgeX + ledgeWidth / 2, ledgeY, 0);
    scene.add(ledgeMesh);
    seg.ledges.push({ mesh: ledgeMesh, x: ledgeX, width: ledgeWidth, y: ledgeY });
  }
  
  return seg;
}

function getTextureColor() {
  const textures = ['stone', 'brick', 'ice', 'wood', 'vine', 'metal'];
  const colors = {
    stone: 0x888888,
    brick: 0xaa6644,
    ice: 0xaaccee,
    wood: 0x886644,
    vine: 0x44aa44,
    metal: 0x667788
  };
  const active = configs.climbStructure.textures.active;
  return colors[textures[active]];
}

// ═══════════════════════════════════════════════════════════
//  OBSTACLES
// ═══════════════════════════════════════════════════════════
function addObstacleBatch(yMin, yMax) {
  const rY = () => yMin + Math.random() * (yMax - yMin);
  const rX = () => -3 + Math.random() * 6;

  // Enemy (side-to-side)
  if (configs.obstacles.enemy.enabled) {
    for (let i = 0; i < configs.obstacles.enemy.count; i++) {
      const geom = new THREE.SphereGeometry(configs.obstacles.enemy.size * 0.5);
      const mat = new THREE.MeshStandardMaterial({ color: configs.obstacles.enemy.color });
      const mesh = new THREE.Mesh(geom, mat);
      const y = rY(); const x = rX();
      mesh.position.set(x, y, 0);
      scene.add(mesh);
      gameState.obstacles.push({ mesh, type: 'enemy', home: x, homeY: y, bobTime: Math.random() * Math.PI * 2 });
    }
  }

  // Falling obstacles (enemy sub-type)
  if (configs.obstacles.enemy.falling.enabled) {
    const fcfg = configs.obstacles.enemy.falling;
    for (let i = 0; i < fcfg.count; i++) {
      const geom = new THREE.DodecahedronGeometry(fcfg.size, 0);
      const mat = new THREE.MeshStandardMaterial({ color: fcfg.color, roughness: 0.8 });
      const mesh = new THREE.Mesh(geom, mat);
      const x = rX();
      const startY = yMax + fcfg.resetAbove * 0.5;
      mesh.position.set(x, startY, 0);
      scene.add(mesh);
      gameState.obstacles.push({ mesh, type: 'falling', fallVel: 0, startX: x });
    }
  }

  // Danger obstacles
  if (configs.obstacles.danger.enabled) {
    for (let i = 0; i < configs.obstacles.danger.count; i++) {
      const geom = new THREE.ConeGeometry(0.4, 1, 4);
      const mat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.3 });
      const mesh = new THREE.Mesh(geom, mat);
      const y = rY(); const x = rX();
      mesh.position.set(x, y, 0);
      mesh.rotation.z = Math.random() * Math.PI * 2;
      scene.add(mesh);
      gameState.obstacles.push({ mesh, type: 'danger', pulseTime: Math.random() * Math.PI * 2, falling: false, fallVel: 0 });
    }
  }

  // Friendly obstacles
  if (configs.obstacles.friendly.enabled) {
    for (let i = 0; i < configs.obstacles.friendly.count; i++) {
      const geom = new THREE.OctahedronGeometry(0.5);
      const mat = new THREE.MeshStandardMaterial({ color: configs.obstacles.friendly.color, emissive: configs.obstacles.friendly.color, emissiveIntensity: 0.2 });
      const mesh = new THREE.Mesh(geom, mat);
      const y = rY(); const x = rX();
      mesh.position.set(x, y, 0);
      scene.add(mesh);
      gameState.obstacles.push({ mesh, type: 'friendly', homeY: y, floatTime: Math.random() * Math.PI * 2, collected: false });
    }
  }

  // Blocking obstacles
  if (configs.obstacles.blocking.enabled) {
    for (let i = 0; i < configs.obstacles.blocking.count; i++) {
      const geom = new THREE.BoxGeometry(configs.obstacles.blocking.size, configs.obstacles.blocking.size, configs.obstacles.blocking.size);
      const mat = new THREE.MeshStandardMaterial({ color: 0x6688aa });
      const mesh = new THREE.Mesh(geom, mat);
      const y = rY(); const x = rX();
      mesh.position.set(x, y, 0);
      scene.add(mesh);
      if (configs.obstacles.blocking.lightEffect) {
        const light = new THREE.PointLight(configs.obstacles.blocking.lightColor, configs.obstacles.blocking.lightIntensity, 5);
        mesh.add(light);
      }
      gameState.obstacles.push({ mesh, type: 'blocking', pulseTime: Math.random() * Math.PI * 2 });
    }
  }

  // Lighting obstacles (coins or orbs)
  if (configs.obstacles.lighting.enabled) {
    for (let i = 0; i < configs.obstacles.lighting.count; i++) {
      const lcfg = configs.obstacles.lighting;
      const isCoin = lcfg.itemType === 'coin';
      let mesh;
      if (isCoin) {
        const geom = new THREE.CylinderGeometry(0.4, 0.4, 0.15, 32);
        const mat = new THREE.MeshStandardMaterial({
          color: lcfg.coin.color, emissive: lcfg.coin.color, emissiveIntensity: 0.3,
          metalness: lcfg.coin.metalness, roughness: lcfg.coin.roughness
        });
        mesh = new THREE.Mesh(geom, mat);
        mesh.rotation.x = 0.5;
      } else {
        const geom = new THREE.SphereGeometry(0.35, 16, 16);
        const mat = new THREE.MeshStandardMaterial({
          color: lcfg.orb.color, emissive: lcfg.orb.color,
          emissiveIntensity: lcfg.orb.emissiveIntensity, transparent: true, opacity: 0.9
        });
        mesh = new THREE.Mesh(geom, mat);
      }
      const y = rY(); const x = rX();
      mesh.position.set(x, y, 0);
      scene.add(mesh);
      const lightColor = isCoin ? lcfg.coin.color : lcfg.orb.color;
      const light = new THREE.PointLight(lightColor, lcfg.intensity, lcfg.range);
      mesh.add(light);
      gameState.obstacles.push({
        mesh, type: 'lighting', light,
        pulseTime: Math.random() * Math.PI * 2,
        revolveTime: Math.random() * Math.PI * 2,
        throbTime: Math.random() * Math.PI * 2,
        collected: false, homeY: y, isCoin
      });
    }
  }

  // Movable obstacles (horizontal platformers)
  if (configs.obstacles.movable.enabled) {
    for (let i = 0; i < configs.obstacles.movable.count; i++) {
      const geom = new THREE.BoxGeometry(configs.obstacles.movable.size * 2, configs.obstacles.movable.size * 0.5, configs.obstacles.movable.size);
      const mat = new THREE.MeshStandardMaterial({ color: configs.obstacles.movable.color });
      const mesh = new THREE.Mesh(geom, mat);
      const y = rY(); const x = rX();
      mesh.position.set(x, y, 0);
      scene.add(mesh);
      gameState.obstacles.push({ mesh, type: 'movable', home: x, range: configs.obstacles.movable.horizontalRange, direction: 1, time: 0 });
    }
  }

  // Mystic obstacles (surprise - phasing in and out)
  if (configs.obstacles.mystic.enabled) {
    for (let i = 0; i < configs.obstacles.mystic.count; i++) {
      const geom = new THREE.TorusGeometry(0.4, 0.15, 16, 32);
      const mat = new THREE.MeshStandardMaterial({
        color: configs.obstacles.mystic.color, emissive: configs.obstacles.mystic.color,
        emissiveIntensity: 0.5, transparent: true, opacity: 1
      });
      const mesh = new THREE.Mesh(geom, mat);
      const y = rY(); const x = rX();
      mesh.position.set(x, y, 0);
      scene.add(mesh);
      gameState.obstacles.push({ mesh, type: 'mystic', phaseTime: 0, visible: true, collected: false });
    }
  }
}

function createClouds() {
  gameState.clouds = [];
  if (!configs.atmosphere.clouds.enabled) return;
  
  for (let i = 0; i < configs.atmosphere.clouds.density; i++) {
    const size = configs.atmosphere.clouds.sizeMin + Math.random() * (configs.atmosphere.clouds.sizeMax - configs.atmosphere.clouds.sizeMin);
    const geom = new THREE.PlaneGeometry(size, size * 0.4);
    const mat = new THREE.MeshBasicMaterial({ 
      color: configs.atmosphere.clouds.color, 
      transparent: true, 
      opacity: configs.atmosphere.clouds.opacity 
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(
      -15 + Math.random() * 30,
      Math.random() * 80,
      -10 + Math.random() * 5
    );

}

// ═══════════════════════════════════════════════════════════
//  ATMOSPHERE - RAIN
// ═══════════════════════════════════════════════════════════
function updateRain(dt) {
  if (!configs.atmosphere.rain.enabled) {
    gameState.rainDrops.forEach(drop => scene.remove(drop.mesh));
    gameState.rainDrops = [];
    return;
  }
  
  // Spawn rain drops
  while (gameState.rainDrops.length < configs.atmosphere.rain.amount) {
    const geom = new THREE.PlaneGeometry(0.05, configs.atmosphere.rain.dropLength / 10);
    const mat = new THREE.MeshBasicMaterial({ color: configs.atmosphere.rain.color, transparent: true, opacity: 0.6 });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(
      camera.position.x - 15 + Math.random() * 30,
      camera.position.y + 20 + Math.random() * 10,
      -5 + Math.random() * 2
    );
    scene.add(mesh);
    gameState.rainDrops.push({ mesh });
  }
  
  // Update rain drops
  gameState.rainDrops.forEach(drop => {
    drop.mesh.position.y -= configs.atmosphere.rain.dropSpeed * dt;
    drop.mesh.position.x -= Math.sin(configs.atmosphere.rain.windAngle * Math.PI / 180) * configs.atmosphere.rain.dropSpeed * dt * 0.5;
    
    if (drop.mesh.position.y < camera.position.y - 15) {
      drop.mesh.position.y = camera.position.y + 25;
      drop.mesh.position.x = camera.position.x - 15 + Math.random() * 30;
    }
  });
}

//  ALTITUDE ZONES
// ═══════════════════════════════════════════════════════════
function updateAltitudeZone() {
  if (!configs.atmosphere.altitudeZones.enabled) return;
  
  const zones = configs.atmosphere.altitudeZones.zones;
  const zoneHeight = configs.atmosphere.altitudeZones.zoneHeight;
  const altitude = gameState.player.mesh.position.y;
  const zoneIndex = Math.min(Math.floor(altitude / zoneHeight), zones.length - 1);
  const zone = zones[Math.max(0, zoneIndex)];
  
  renderer.setClearColor(zone.bgColor);
}

//  PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnParticle(x, y, type, data = {}) {
  const geom = new THREE.CircleGeometry(data.radius || 0.1, 8);
  const mat = new THREE.MeshBasicMaterial({ color: data.color || 0xffffff, transparent: true });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(x, y, 1);
  scene.add(mesh);
  
  gameState.particles.push({
    mesh,
    velocity: data.velocity || new THREE.Vector2(0, 0),
    lifetime: data.lifetime || 1,
    maxLifetime: data.lifetime || 1,
    type
  });
}

function updateParticles(dt) {
  gameState.particles = gameState.particles.filter(p => {
    p.lifetime -= dt;
    if (p.lifetime <= 0) {
      scene.remove(p.mesh);
      return false;
    }
    
    p.mesh.position.x += p.velocity.x * dt;
    p.mesh.position.y += p.velocity.y * dt;
    p.velocity.y += configs.player.movement.gravity * dt * 0.1;
    
    const fade = p.lifetime / p.maxLifetime;
    p.mesh.material.opacity = fade;
    p.mesh.scale.setScalar(fade);
    
    return true;
  });
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
  gameState.keys[e.code] = true;

  if (e.code === 'KeyP') {
    panelOpen = !panelOpen;
    panel.classList.toggle('open', panelOpen);
    hudEl.style.left = panelOpen ? '360px' : '20px';
  }

  // Space while latched: de-latch first so jump fires this frame
  if (e.code === 'Space' && gameState.isLatched) {
    gameState.isLatched = false;
    gameState.keys._spaceHeld = false;
  }

  // Shift+Down: drop through platform
  if (e.code === 'ArrowDown' &&
      (gameState.keys.ShiftLeft || gameState.keys.ShiftRight) &&
      gameState.isGrounded && gameState.player) {
    gameState.dropThrough = 0.3;
    gameState.player.velocity.y = -4;
  }

  // Latch/De-latch — only latch when actually touching a wall
  // (skip if Shift+Down drop-through was triggered)
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
    if (gameState.keys.ArrowDown && gameState.isGrounded && gameState.player) {
      // Shift+Down combo: drop through — do not latch
      gameState.dropThrough = 0.3;
      gameState.player.velocity.y = -4;
    } else if (configs.climbStructure.latching.enabled) {
      if (gameState.isLatched) {
        gameState.isLatched = false;
      } else {
        const nearWall = gameState.wallContact !== null ||
                          (gameState.player && checkWallProximity() !== null);
        if (nearWall) {
          gameState.isLatched = true;
          if (configs.fx.latchFX.enabled) spawnLatchFX();
        }
      }
    }
  }

  // C key: switch wall side (inner ↔ outer face)
  if (e.code === 'KeyC' && gameState.player && !gameState.sideTransition) {
    if (!configs.climbStructure.wallSwitch.enabled) return;
    const wsc = configs.climbStructure.wallSwitch;
    const p = gameState.player;
    const cfg = configs.player;
    const wt = configs.climbStructure.generation.wallThickness;
    const halfW = cfg.size.baseWidth * 0.5 * p.mesh.scale.x;

    if (gameState.wallSide === 'inner' && gameState.wallContact !== null) {
      // Switch to outer face of the wall we're touching
      const contactSide = gameState.wallContact;
      let wallX = null;
      for (const seg of gameState.climbSegments) {
        const found = seg.walls.find(w => w.side === contactSide);
        if (found) { wallX = found.x; break; }
      }
      if (wallX === null) return;

      // Target x on outer face
      const endX = contactSide === 'left'
        ? wallX - wt / 2 - halfW     // left of left wall
        : wallX + wt / 2 + halfW;    // right of right wall

      const foreshorten = wsc.foreshortRightToLeft;
      const duration = wsc.animationType === 1 ? 0.001 : (1 / wsc.changeSpeed);
      gameState.sideTransition = {
        progress: 0, duration, toOuter: true, wallSide: contactSide,
        startX: p.mesh.position.x, endX, foreshorten
      };

    } else if (gameState.wallSide === 'outer' && gameState.outerWall !== null) {
      // Switch back to inner face
      const contactSide = gameState.outerWall;
      let wallX = null;
      for (const seg of gameState.climbSegments) {
        const found = seg.walls.find(w => w.side === contactSide);
        if (found) { wallX = found.x; break; }
      }
      if (wallX === null) return;

      const endX = contactSide === 'left'
        ? wallX + wt / 2 + halfW    // right of left wall (inner)
        : wallX - wt / 2 - halfW;   // left of right wall (inner)

      const foreshorten = wsc.foreshortLeftToRight;
      const duration = wsc.animationType === 1 ? 0.001 : (1 / wsc.changeSpeed);
      gameState.sideTransition = {
        progress: 0, duration, toOuter: false, wallSide: null,
        startX: p.mesh.position.x, endX, foreshorten
      };
    }
  }
});

window.addEventListener('keyup', e => {
  gameState.keys[e.code] = false;
});

function spawnLatchFX() {
  const p = gameState.player.mesh.position;
  for (let i = 0; i < configs.fx.latchFX.sparkCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    spawnParticle(p.x, p.y, 'spark', {
      radius: 0.08,
      color: 0xffdd44,
      velocity: new THREE.Vector2(Math.cos(angle) * 2, Math.sin(angle) * 2),
      lifetime: configs.fx.latchFX.sparkLifetime
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  COLLISION HELPERS
// ═══════════════════════════════════════════════════════════
function checkWallProximity() {
  const p = gameState.player;
  const cfg = configs.player;
  const latchRange = configs.climbStructure.latching.latchRange;
  const wallThickness = configs.climbStructure.generation.wallThickness;
  const halfW = cfg.size.baseWidth * 0.5 * p.mesh.scale.x;
  const halfH = cfg.size.baseHeight * 0.5 * p.mesh.scale.y;
  const px = p.mesh.position.x;
  const py = p.mesh.position.y;
  const isOuter = gameState.wallSide === 'outer';
  const outerWall = gameState.outerWall;

  for (const seg of gameState.climbSegments) {
    if (py + halfH < seg.yStart || py - halfH > seg.yStart + seg.segHeight) continue;
    for (const wall of seg.walls) {
      const wallRight = wall.x + wallThickness / 2;
      const wallLeft  = wall.x - wallThickness / 2;
      if (wall.side === 'left') {
        if (isOuter && outerWall === 'left') {
          // Outer side of left wall: player is to its left, check right edge near left face
          if (px + halfW >= wallLeft - latchRange) return 'left';
        } else if (!isOuter) {
          if (px - halfW <= wallRight + latchRange) return 'left';
        }
      } else {
        if (isOuter && outerWall === 'right') {
          // Outer side of right wall: player is to its right, check left edge near right face
          if (px - halfW <= wallRight + latchRange) return 'right';
        } else if (!isOuter) {
          if (px + halfW >= wallLeft - latchRange) return 'right';
        }
      }
    }
  }
  return null;
}

function resolveCollisions() {
  const p = gameState.player;
  const cfg = configs.player;
  const wallThickness = configs.climbStructure.generation.wallThickness;
  const isOuter = gameState.wallSide === 'outer';
  const outerWall = gameState.outerWall;

  for (const seg of gameState.climbSegments) {
    const halfW = () => cfg.size.baseWidth  * 0.5 * p.mesh.scale.x;
    const halfH = () => cfg.size.baseHeight * 0.5 * p.mesh.scale.y;

    // Quick vertical cull
    if (p.mesh.position.y + halfH() < seg.yStart - 0.5 ||
        p.mesh.position.y - halfH() > seg.yStart + seg.segHeight + 0.5) continue;

    // ── Wall collisions (handles inner and outer face) ──
    for (const wall of seg.walls) {
      if (gameState.sideTransition) continue; // transition controls x

      const wallMidY = seg.yStart + seg.segHeight / 2;
      const wallHalfH = seg.segHeight / 2;
      const pBottom = p.mesh.position.y - halfH();
      const pTop    = p.mesh.position.y + halfH();
      if (pBottom >= wallMidY + wallHalfH || pTop <= wallMidY - wallHalfH) continue;

      const isThisOuterWall = isOuter && outerWall === wall.side;

      if (wall.side === 'left') {
        if (isThisOuterWall) {
          // Outer-left: keep player left of left face
          const wallLeft = wall.x - wallThickness / 2;
          const pRight = p.mesh.position.x + halfW();
          if (pRight > wallLeft) {
            p.mesh.position.x = wallLeft - halfW();
            if (p.velocity.x > 0) p.velocity.x = 0;
          }
        } else {
          // Inner-left: keep player right of right face
          const wallRight = wall.x + wallThickness / 2;
          const pLeft = p.mesh.position.x - halfW();
          if (pLeft < wallRight) {
            p.mesh.position.x = wallRight + halfW();
            if (p.velocity.x < 0) p.velocity.x = 0;
          }
        }
      } else {
        if (isThisOuterWall) {
          // Outer-right: keep player right of right face
          const wallRight = wall.x + wallThickness / 2;
          const pLeft = p.mesh.position.x - halfW();
          if (pLeft < wallRight) {
            p.mesh.position.x = wallRight + halfW();
            if (p.velocity.x < 0) p.velocity.x = 0;
          }
        } else {
          // Inner-right: keep player left of left face
          const wallLeft = wall.x - wallThickness / 2;
          const pRight = p.mesh.position.x + halfW();
          if (pRight > wallLeft) {
            p.mesh.position.x = wallLeft - halfW();
            if (p.velocity.x > 0) p.velocity.x = 0;
          }
        }
      }
    }

    // ── Platform collisions (one-way, land from above; skipped during drop-through) ──
    if (p.velocity.y <= 0.01 && gameState.dropThrough <= 0) {
      for (const plat of seg.platforms) {
        const pLeft  = p.mesh.position.x - halfW();
        const pRight = p.mesh.position.x + halfW();
        const pBottom = p.mesh.position.y - halfH();
        const platTop = plat.y + 0.15;
        if (pRight <= plat.x || pLeft >= plat.x + plat.width) continue;
        if (pBottom <= platTop && pBottom >= plat.y - 0.55) {
          p.mesh.position.y = platTop + halfH();
          p.velocity.y = 0;
          gameState.isGrounded = true;
        }
      }

      // ── Ledge collisions (one-way, land from above; skipped during drop-through) ──
      for (const ledge of seg.ledges) {
        const pLeft  = p.mesh.position.x - halfW();
        const pRight = p.mesh.position.x + halfW();
        const pBottom = p.mesh.position.y - halfH();
        const ledgeTop = ledge.y + 0.1;
        if (pRight <= ledge.x || pLeft >= ledge.x + ledge.width) continue;
        if (pBottom <= ledgeTop && pBottom >= ledge.y - 0.45) {
          p.mesh.position.y = ledgeTop + halfH();
          p.velocity.y = 0;
          gameState.isGrounded = true;
        }
      }
    }
  }

  // Ground floor — hard stop at y = 0
  const floorHalfH = cfg.size.baseHeight * 0.5 * p.mesh.scale.y;
  if (p.mesh.position.y - floorHalfH < 0 && p.velocity.y <= 0) {
    p.mesh.position.y = floorHalfH;
    p.velocity.y = 0;
    gameState.isGrounded = true;
  }
}

// ═══════════════════════════════════════════════════════════
//  WALL SIDE TRANSITION
// ═══════════════════════════════════════════════════════════
function updateWallSideTransition(dt) {
  const t = gameState.sideTransition;
  if (!t) return;

  const wsc = configs.climbStructure.wallSwitch;
  const p   = gameState.player;
  const cfg = configs.player;

  t.progress = Math.min(1, t.progress + dt * wsc.changeSpeed);

  // Ease in-out cubic
  const raw = t.progress;
  const ease = raw < 0.5 ? 4*raw*raw*raw : 1 - Math.pow(-2*raw+2,3)/2;

  if (wsc.animationType === 0) {
    // Slide: tween x, foreshorten mid-path if configured
    p.mesh.position.x = t.startX + (t.endX - t.startX) * ease;
    if (t.foreshorten) {
      const mid = Math.sin(raw * Math.PI);            // peaks at progress=0.5
      p.mesh.scale.x = 1 - (1 - wsc.foreshortScale) * mid;
      p.mesh.position.z = -0.7 * mid;                // pass behind wall mid-way
    }

  } else if (wsc.animationType === 1) {
    // Instant: snap immediately
    p.mesh.position.x = t.endX;
    t.progress = 1;

  } else if (wsc.animationType === 2) {
    // Flip: scale to 0, reposition, scale back
    if (raw < 0.5) {
      p.mesh.scale.x = 1 - raw * 2;
      if (t.foreshorten) p.mesh.position.z = -0.7 * (raw * 2);
    } else {
      p.mesh.position.x = t.endX;
      p.mesh.scale.x = (raw - 0.5) * 2;
      if (t.foreshorten) p.mesh.position.z = -0.7 * (1 - (raw - 0.5) * 2);
    }
  }

  if (t.progress >= 1) {
    // Finalise
    p.mesh.position.x = t.endX;
    p.mesh.position.z = 0;
    const staminaRatio = gameState.stamina / cfg.stamina.maxStamina;
    const ws = 1 + (staminaRatio - 0.5) * cfg.size.staminaWidthFactor;
    p.mesh.scale.x = Math.max(cfg.size.minScale, Math.min(cfg.size.maxScale, ws));

    gameState.wallSide  = t.toOuter ? 'outer' : 'inner';
    gameState.outerWall = t.toOuter ? t.wallSide : null;
    gameState.sideTransition = null;
  }
}

// ═══════════════════════════════════════════════════════════
//  PLAYER UPDATE
// ═══════════════════════════════════════════════════════════
function updatePlayer(dt) {
  const p = gameState.player;
  const cfg = configs.player;

  // Tick drop-through timer
  if (gameState.dropThrough > 0) gameState.dropThrough -= dt;

  // Animate wall-side transition (takes priority over x input)
  updateWallSideTransition(dt);

  // Apply rain effects
  let speedMult = gameState.speedBoost;
  let staminaMult = 1;
  if (configs.atmosphere.rain.enabled) {
    speedMult *= configs.atmosphere.rain.playerSpeedEffect;
    staminaMult *= configs.atmosphere.rain.playerStaminaEffect;
  }

  // Determine wall contact before applying forces
  gameState.wallContact = checkWallProximity();

  // Horizontal movement (blocked during side transition — transition owns x)
  if (!gameState.sideTransition) {
    if (!gameState.isLatched) {
      const moveSpeed = cfg.movement.speed * speedMult;
      if (gameState.keys.ArrowLeft)  p.velocity.x -= moveSpeed * cfg.movement.acceleration;
      if (gameState.keys.ArrowRight) p.velocity.x += moveSpeed * cfg.movement.acceleration;
    } else {
      p.velocity.x *= 0.8;
    }
  } else {
    p.velocity.x = 0;
  }

  // Vertical movement — climb mode or jetpack
  gameState.isClimbing = false;
  const climbMode = configs.climbStructure.climbMode;
  const canClimb = climbMode === 'jetpack' || gameState.wallContact !== null;

  if (gameState.keys.ArrowUp && !gameState.isLatched) {
    if (canClimb) {
      p.velocity.y = cfg.movement.climbSpeed * speedMult;
      gameState.isClimbing = true;
      gameState.stamina -= cfg.stamina.drainRate * cfg.stamina.climbDrainMultiplier * dt * staminaMult;
    } else {
      // Climbing mode, not on wall — gravity still applies
      p.velocity.y += cfg.movement.gravity * dt;
    }
  } else if (!gameState.isLatched) {
    p.velocity.y += cfg.movement.gravity * dt;
  } else {
    p.velocity.y = 0;
    gameState.stamina -= configs.climbStructure.latching.latchStaminaDrain * dt;
  }

  // Jump — from ground OR from wall (wall jump)
  const canJump = (gameState.isGrounded || gameState.wallContact !== null) &&
                  !gameState.isLatched && !gameState.keys._spaceHeld;
  if (gameState.keys.Space && canJump) {
    p.velocity.y = cfg.movement.jumpHeight;
    // Wall jump: add horizontal kick away from the wall
    if (!gameState.isGrounded && gameState.wallContact !== null) {
      const kick = cfg.movement.jumpHeight * 0.55;
      p.velocity.x = gameState.wallContact === 'left' ? kick : -kick;
    }
    gameState.keys._spaceHeld = true;
    gameState.stamina -= cfg.stamina.jumpDrainAmount;
    if (configs.fx.jumpFX.enabled) spawnJumpFX();
  }
  if (!gameState.keys.Space) gameState.keys._spaceHeld = false;

  // Stamina reload
  if (!gameState.isClimbing && !gameState.isLatched) {
    gameState.stamina = Math.min(cfg.stamina.maxStamina, gameState.stamina + (cfg.stamina.maxStamina / cfg.stamina.reloadTime) * dt);
  }
  gameState.stamina = Math.max(0, gameState.stamina);

  // Out-of-stamina blocks upward climb
  if (gameState.stamina <= 0 && gameState.isClimbing) {
    p.velocity.y = Math.min(p.velocity.y, 0);
  }

  // Apply velocity
  p.velocity.x *= 0.85;
  p.mesh.position.x += p.velocity.x * dt;
  p.mesh.position.y += p.velocity.y * dt;

  // Reset grounded before collision resolution
  gameState.isGrounded = false;

  // Structural collision (platforms, ledges, walls)
  resolveCollisions();

  // Safety bounds (wider than any generated wall)
  const safetyBounds = 20;
  p.mesh.position.x = Math.max(-safetyBounds, Math.min(safetyBounds, p.mesh.position.x));

  // Ground floor
  if (p.mesh.position.y < 1) {
    p.mesh.position.y = 1;
    p.velocity.y = 0;
    gameState.isGrounded = true;
  }
  
  // Update size based on stamina
  const staminaRatio = gameState.stamina / cfg.stamina.maxStamina;
  const widthScale = 1 + (staminaRatio - 0.5) * cfg.size.staminaWidthFactor;
  const heightScale = 1 + (staminaRatio - 0.5) * cfg.size.staminaHeightFactor;
  p.mesh.scale.set(
    Math.max(cfg.size.minScale, Math.min(cfg.size.maxScale, widthScale)),
    Math.max(cfg.size.minScale, Math.min(cfg.size.maxScale, heightScale)),
    1
  );
  
  // Update altitude
  gameState.altitude = Math.max(0, Math.floor(p.mesh.position.y));
  
  // Momentum trail (surprise!)
  if (cfg.momentum.enabled && cfg.momentum.trailEnabled && gameState.isClimbing) {
    if (!p.trailTimer) p.trailTimer = 0;
    p.trailTimer += dt;
    if (p.trailTimer > 0.1) {
      p.trailTimer = 0;
      const geom = p.mesh.geometry.clone();
      const mat = new THREE.MeshBasicMaterial({ 
        color: cfg.color, 
        transparent: true, 
        opacity: 0.3 
      });
      const ghost = new THREE.Mesh(geom, mat);
      ghost.position.copy(p.mesh.position);
      ghost.scale.copy(p.mesh.scale);
      scene.add(ghost);
      p.trailGhosts.push({ mesh: ghost, life: 0.5 });
    }
  }
  
  // Update trail ghosts
  p.trailGhosts = p.trailGhosts.filter(g => {
    g.life -= dt;
    if (g.life <= 0) {
      scene.remove(g.mesh);
      return false;
    }
    g.mesh.material.opacity = g.life * 0.6;
    return true;
  });
  
  // Damage cooldown
  if (p.damageCooldown > 0) p.damageCooldown -= dt;
  if (p.hurtFlash > 0) {
    p.hurtFlash -= dt;
    p.mesh.material.emissive.setHex(0xff0000);
    p.mesh.material.emissiveIntensity = 0.5;
  } else {
    p.mesh.material.emissive.setHex(0x000000);
    p.mesh.material.emissiveIntensity = 0;
  }
}

function spawnJumpFX() {
  const p = gameState.player.mesh.position;
  for (let i = 0; i < configs.fx.jumpFX.burstCount; i++) {
    const angle = Math.PI + (Math.random() - 0.5) * Math.PI * 0.8;
    spawnParticle(p.x, p.y - 0.5, 'jump', {
      radius: 0.12,
      color: 0x64c8ff,
      velocity: new THREE.Vector2(Math.cos(angle) * 3, Math.sin(angle) * 3),
      lifetime: configs.fx.jumpFX.burstLifetime
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  OBSTACLE UPDATE
// ═══════════════════════════════════════════════════════════
function updateObstacles(dt) {
  const p = gameState.player.mesh.position;
  
  gameState.obstacles.forEach(obs => {
    if (obs.type === 'enemy') {
      obs.mesh.visible = configs.obstacles.enemy.enabled;
      if (!configs.obstacles.enemy.enabled) return;
      // Bob and patrol
      obs.bobTime += dt * configs.obstacles.enemy.bobSpeed;
      const bobY = Math.sin(obs.bobTime) * configs.obstacles.enemy.bobHeight;
      obs.mesh.position.y = obs.homeY + bobY;

      const patrol = Math.sin(gameState.time * configs.obstacles.enemy.speed * 0.5) * configs.obstacles.enemy.patrolRange;
      obs.mesh.position.x = obs.home + patrol;

      // Collision with player
      if (obs.mesh.position.distanceTo(p) < 1 && gameState.player.damageCooldown <= 0) {
        gameState.stamina -= configs.obstacles.enemy.staminaDrain;
        gameState.health -= configs.obstacles.enemy.damage;
        gameState.player.damageCooldown = configs.player.health.damageCooldown;
        gameState.player.hurtFlash = configs.player.health.hurtFlashDuration;
        if (configs.fx.damageFX.enabled) spawnDamageFX();
      }
    }

    if (obs.type === 'falling') {
      const fcfg = configs.obstacles.enemy.falling;
      obs.mesh.visible = fcfg.enabled;
      if (!fcfg.enabled) return;
      // Fall with gravity
      obs.fallVel -= fcfg.speed * dt;
      obs.mesh.position.y += obs.fallVel * dt;
      // Tumble
      obs.mesh.rotation.x += dt * 1.8;
      obs.mesh.rotation.z += dt * 1.2;
      // Reset when far below player
      if (obs.mesh.position.y < gameState.player.mesh.position.y - 8) {
        obs.mesh.position.x = gameState.player.mesh.position.x + (Math.random() - 0.5) * 6;
        obs.mesh.position.y = gameState.player.mesh.position.y + fcfg.resetAbove;
        obs.fallVel = 0;
      }
      // Collision with player
      if (obs.mesh.position.distanceTo(p) < 0.9 && gameState.player.damageCooldown <= 0) {
        gameState.stamina -= fcfg.staminaDrain;
        gameState.health -= fcfg.damage;
        gameState.player.damageCooldown = configs.player.health.damageCooldown;
        gameState.player.hurtFlash = configs.player.health.hurtFlashDuration;
        if (configs.fx.damageFX.enabled) spawnDamageFX();
        obs.fallVel = fcfg.speed * 0.5; // bounce off player upward
        obs.mesh.position.y = gameState.player.mesh.position.y + fcfg.resetAbove;
      }
    }
    
    if (obs.type === 'danger') {
      obs.mesh.visible = configs.obstacles.danger.enabled;
      if (!configs.obstacles.danger.enabled) return;
      // Pulse effect += dt * configs.obstacles.danger.pulseSpeed;
      const pulse = 0.5 + Math.sin(obs.pulseTime) * 0.5;
      obs.mesh.material.emissiveIntensity = configs.obstacles.danger.glowIntensity * pulse;
      obs.mesh.rotation.z += dt;
      
      // Fall on touch
      if (configs.obstacles.danger.fallOnTouch && obs.mesh.position.distanceTo(p) < configs.obstacles.danger.effectRadius) {
        obs.falling = true;
      }
      
      if (obs.falling) {
        obs.fallVel += -20 * dt;
        obs.mesh.position.y += obs.fallVel * dt;
      }
      
      // Collision with player
      if (obs.mesh.position.distanceTo(p) < 0.8 && gameState.player.damageCooldown <= 0) {
        gameState.stamina -= configs.obstacles.danger.staminaDrain;
        gameState.health -= configs.obstacles.danger.damage;
        gameState.player.damageCooldown = configs.player.health.damageCooldown;
        gameState.player.hurtFlash = configs.player.health.hurtFlashDuration;
        if (configs.fx.damageFX.enabled) spawnDamageFX();
      }
    }
    
    if (obs.type === 'friendly' && !obs.collected) {
      obs.mesh.visible = configs.obstacles.friendly.enabled;
      if (!configs.obstacles.friendly.enabled) return;
      // Float animation += dt * configs.obstacles.friendly.floatSpeed;
      const floatY = Math.sin(obs.floatTime) * configs.obstacles.friendly.floatHeight;
      obs.mesh.position.y = obs.homeY + floatY;
      obs.mesh.rotation.y += dt;
      
      const glowPulse = 0.5 + Math.sin(obs.floatTime * configs.obstacles.friendly.glowPulse) * 0.5;
      obs.mesh.material.emissiveIntensity = 0.2 + glowPulse * 0.3;
      
      // Collection
      if (obs.mesh.position.distanceTo(p) < 1) {
        obs.collected = true;
        gameState.stamina = Math.min(configs.player.stamina.maxStamina, gameState.stamina + configs.obstacles.friendly.staminaRestore);
        gameState.health = Math.min(configs.player.health.maxHP, gameState.health + configs.obstacles.friendly.healthRestore);
        gameState.speedBoost = configs.obstacles.friendly.speedBoost;
        setTimeout(() => { gameState.speedBoost = 1; }, configs.obstacles.friendly.boostDuration * 1000);
        scene.remove(obs.mesh);
        if (configs.fx.collectFX.enabled) spawnCollectFX(obs.mesh.position);
      }
    }
    
    if (obs.type === 'blocking') {
      obs.mesh.visible = configs.obstacles.blocking.enabled;
      if (!configs.obstacles.blocking.enabled) return;
      // Light pulse
      obs.pulseTime += dt * configs.obstacles.blocking.lightPulseSpeed;
      const pulse = 0.7 + Math.sin(obs.pulseTime) * 0.3;
      if (obs.mesh.children.length > 0) {
        obs.mesh.children[0].intensity = configs.obstacles.blocking.lightIntensity * pulse;
      }
    }
    
    if (obs.type === 'lighting') {
      obs.mesh.visible = configs.obstacles.lighting.enabled && !obs.collected;
      if (!configs.obstacles.lighting.enabled || obs.collected) return;
      const lcfg = configs.obstacles.lighting;

      // Light pulse + flicker
      obs.pulseTime += dt * lcfg.pulseSpeed;
      const pulse = 0.7 + Math.sin(obs.pulseTime) * lcfg.pulseDelta;
      obs.light.intensity = lcfg.intensity * pulse;
      if (lcfg.flickerEnabled) {
        if (Math.random() < dt * lcfg.flickerSpeed) {
          obs.light.intensity *= Math.random() * 0.5 + 0.5;
        }
      }

      if (obs.isCoin) {
        // Coin: revolve (spin on local Y/Z axes)
        if (lcfg.coin.revolveEnabled) {
          obs.revolveTime += dt * lcfg.coin.revolveSpeed;
          obs.mesh.rotation.z = obs.revolveTime; // spin face (visible from camera angle)
        }
      } else {
        // Orb: scale throb
        if (lcfg.orb.throbEnabled) {
          obs.throbTime += dt * lcfg.orb.throbSpeed;
          const scl = 1 + Math.sin(obs.throbTime) * lcfg.orb.throbRange;
          obs.mesh.scale.setScalar(scl);
        }
      }

      // Collection collision
      const dist = obs.mesh.position.distanceTo(p);
      if (dist < 0.75) {
        obs.collected = true;
        scene.remove(obs.mesh);
        if (obs.isCoin) {
          if (lcfg.score.enabled) gameState.score += lcfg.score.perCoin;
          spawnCoinCollectFX(obs.mesh.position, true, lcfg.coin.collectAnim);
        } else {
          gameState.orbsCollected++;
          spawnCoinCollectFX(obs.mesh.position, false, lcfg.orb.collectAnim);
        }
      }
    }
    
    if (obs.type === 'movable') {
      obs.mesh.visible = configs.obstacles.movable.enabled;
      if (!configs.obstacles.movable.enabled) return;
      // Record previous x to compute carry-delta for rider
      const prevX = obs.mesh.position.x;

      // Horizontal movement
      obs.time += dt * configs.obstacles.movable.horizontalSpeed;
      const offset = Math.sin(obs.time) * obs.range;
      obs.mesh.position.x = obs.home + offset;

      // ── Platform collision with player (no HP/stamina damage) ──
      const mv = configs.obstacles.movable;
      const halfObsW = mv.size;          // half of geometry width (size * 2)
      const halfObsH = mv.size * 0.25;   // half of geometry height (size * 0.5)
      const obsTop    = obs.mesh.position.y + halfObsH;
      const obsBottom = obs.mesh.position.y - halfObsH;
      const obsLeft   = obs.mesh.position.x - halfObsW;
      const obsRight  = obs.mesh.position.x + halfObsW;

      const pl = gameState.player;
      const pCfg = configs.player;
      const halfPW = pCfg.size.baseWidth  * 0.5 * pl.mesh.scale.x;
      const halfPH = pCfg.size.baseHeight * 0.5 * pl.mesh.scale.y;
      const pLeft   = pl.mesh.position.x - halfPW;
      const pRight  = pl.mesh.position.x + halfPW;
      const pBottom = pl.mesh.position.y - halfPH;
      const pTop    = pl.mesh.position.y + halfPH;

      if (pRight > obsLeft && pLeft < obsRight) {
        // Land from above: snap to top, carry with platform horizontally
        if (pl.velocity.y <= 0.01 && pBottom <= obsTop && pBottom >= obsBottom - 0.5) {
          pl.mesh.position.y = obsTop + halfPH;
          pl.velocity.y = 0;
          gameState.isGrounded = true;
          pl.mesh.position.x += obs.mesh.position.x - prevX; // carry
        }
        // Block from below: prevent upward movement into platform bottom
        if (pl.velocity.y > 0 && pTop >= obsBottom && pTop <= obsTop + 0.4) {
          pl.mesh.position.y = obsBottom - halfPH;
          pl.velocity.y = 0;
        }
      }
    }
    
    if (obs.type === 'mystic' && !obs.collected) {
      obs.mesh.visible = configs.obstacles.mystic.enabled;
      if (!configs.obstacles.mystic.enabled) return;
      // Phasing in/out (surprise feature!) += dt * configs.obstacles.mystic.phaseSpeed;
      const cycleDuration = configs.obstacles.mystic.visibleDuration + configs.obstacles.mystic.hiddenDuration;
      const cyclePos = obs.phaseTime % cycleDuration;
      
      if (cyclePos < configs.obstacles.mystic.visibleDuration) {
        obs.visible = true;
        obs.mesh.material.opacity = Math.min(1, (cyclePos / 0.5));
      } else {
        obs.visible = false;
        obs.mesh.material.opacity = Math.max(0, 1 - ((cyclePos - configs.obstacles.mystic.visibleDuration) / 0.5));
      }
      
      obs.mesh.rotation.x += dt;
      obs.mesh.rotation.y += dt * 0.7;
      
      // Collection when visible
      if (obs.visible && obs.mesh.position.distanceTo(p) < 1) {
        obs.collected = true;
        gameState.stamina = Math.min(configs.player.stamina.maxStamina, gameState.stamina + configs.obstacles.mystic.staminaRestore);
        if (configs.obstacles.mystic.bonusOnCatch) {
          gameState.health = Math.min(configs.player.health.maxHP, gameState.health + 1);
        }
        scene.remove(obs.mesh);
        if (configs.fx.collectFX.enabled) spawnCollectFX(obs.mesh.position);
      }
    }
  });
}

function spawnDamageFX() {
  const p = gameState.player.mesh.position;
  for (let i = 0; i < configs.fx.damageFX.symbolCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const symbols = ['!', 'X', '*', '#'];
    spawnParticle(p.x, p.y, 'damage', {
      radius: 0.15,
      color: 0xff4444,
      velocity: new THREE.Vector2(Math.cos(angle) * 2, Math.sin(angle) * 2),
      lifetime: configs.fx.damageFX.symbolLifetime
    });
  }
  
  // Camera shake
  gameState.cameraShake = { 
    active: true, 
    time: configs.fx.landFX.screenShakeDuration, 
    intensity: configs.fx.damageFX.shockwaveRadius / 10 
  };
}

function spawnCollectFX(pos) {
  for (let i = 0; i < configs.fx.collectFX.sparkleCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    spawnParticle(pos.x, pos.y, 'collect', {
      radius: 0.12,
      color: 0xffdd44,
      velocity: new THREE.Vector2(Math.cos(angle) * 2, Math.sin(angle) * 2),
      lifetime: configs.fx.collectFX.sparkleLifetime
    });
  }
}

function spawnCoinCollectFX(pos, isCoin, animType) {
  if (animType === 2) return; // 'None'
  const color = isCoin ? 0xffd700 : 0x88ccff;
  const count = animType === 0 ? 8 : 12; // Burst vs Spiral
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = animType === 0 ? 2.5 : 1.8;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;
    if (animType === 1) { // Spiral — add upward drift
      vy = Math.abs(vy) + 1.5;
      vx *= 0.6;
    }
    spawnParticle(pos.x, pos.y, 'collect', {
      radius: isCoin ? 0.1 : 0.14,
      color,
      velocity: new THREE.Vector2(vx, vy),
      lifetime: 0.7
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════
function updateCamera(dt) {
  const target = gameState.player.mesh.position;
  const smoothing = 0.08;
  
  camera.position.x += (target.x - camera.position.x) * smoothing;
  camera.position.y += (target.y + 5 - camera.position.y) * smoothing;
  
  // Camera shake
  if (gameState.cameraShake.active) {
    gameState.cameraShake.time -= dt;
    const shake = gameState.cameraShake.intensity;
    camera.position.x += (Math.random() - 0.5) * shake * 0.1;
    camera.position.y += (Math.random() - 0.5) * shake * 0.1;
    
    if (gameState.cameraShake.time <= 0) {
      gameState.cameraShake.active = false;
    }
  }
  
  // Checkpoint-based structure generation (only when player reaches checkpoint)
  const checkpointInterval = configs.climbStructure.generation.segmentHeight * 3;
  if (camera.position.y >= gameState.nextCheckpoint) {
    // Generate 5 segments at checkpoint
    for (let i = 0; i < 5; i++) {
      const segmentY = gameState.segmentCount * configs.climbStructure.generation.segmentHeight;
      const seg = generateClimbSegment(segmentY);
      gameState.climbSegments.push(seg);
      gameState.segmentCount++;
    }
    gameState.nextCheckpoint += checkpointInterval;
  }

  // Obstacle batch spawning — add new obstacles as player climbs
  const obstacleInterval = configs.climbStructure.generation.segmentHeight * 3;
  if (camera.position.y >= gameState.nextObstacleSpawnY) {
    const yBase = gameState.nextObstacleSpawnY + configs.climbStructure.generation.segmentHeight;
    addObstacleBatch(yBase, yBase + obstacleInterval);
    gameState.nextObstacleSpawnY += obstacleInterval;

    // Cull obstacles that are far below the player
    const cullY = gameState.player.mesh.position.y - configs.climbStructure.generation.segmentHeight * 6;
    gameState.obstacles = gameState.obstacles.filter(obs => {
      if (obs.mesh.position.y < cullY) {
        scene.remove(obs.mesh);
        return false;
      }
      return true;
    });
  }
  
  // Cleanup old segments far below player (keep performance stable)
  cleanupOldSegments();
}

function cleanupOldSegments() {
  const cleanupThreshold = camera.position.y - 50;
  const segmentsToKeep = [];
  
  gameState.climbSegments.forEach(seg => {
    // Check if segment is still relevant
    const segmentY = seg.walls[0]?.mesh.position.y || 0;
    if (segmentY > cleanupThreshold) {
      segmentsToKeep.push(seg);
    } else {
      // Remove segment meshes from scene
      seg.walls.forEach(w => scene.remove(w.mesh));
      seg.platforms.forEach(p => scene.remove(p.mesh));
      seg.ledges.forEach(l => scene.remove(l.mesh));
    }
  });
  
  gameState.climbSegments = segmentsToKeep;
}

// ═══════════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════════
function updateHUD() {
  const staminaPercent = (gameState.stamina / configs.player.stamina.maxStamina) * 100;
  document.getElementById('stamina-fill').style.width = staminaPercent + '%';
  document.getElementById('stamina-text').textContent = Math.floor(gameState.stamina);

  const healthPercent = (gameState.health / configs.player.health.maxHP) * 100;
  document.getElementById('health-fill').style.width = healthPercent + '%';
  document.getElementById('health-text').textContent = gameState.health;

  document.getElementById('altitude-text').textContent = gameState.altitude;

  // Stamina warning FX
  if (configs.fx.staminaWarnFX.enabled && staminaPercent < configs.fx.staminaWarnFX.threshold * 100) {
    const pulse = Math.sin(gameState.time * configs.fx.staminaWarnFX.pulseSpeed) * 0.5 + 0.5;
    document.getElementById('stamina-fill').style.boxShadow = `0 0 ${10 + pulse * 10}px ${configs.fx.staminaWarnFX.pulseColor}`;
  } else {
    document.getElementById('stamina-fill').style.boxShadow = 'none';
  }

  // Score / orb tracker
  const lcfg = configs.obstacles.lighting;
  const isCoin = lcfg.itemType === 'coin';
  const sdCoins = document.getElementById('sd-coins');
  const sdOrbs  = document.getElementById('sd-orbs');
  if (lcfg.enabled) {
    if (isCoin && lcfg.score.enabled) {
      sdCoins.style.display = 'block';
      sdOrbs.style.display  = 'none';
      document.getElementById('score-text').textContent = gameState.score;
    } else if (!isCoin && lcfg.orb.goalEnabled) {
      sdCoins.style.display = 'none';
      sdOrbs.style.display  = 'block';
      const total = gameState.obstacles.filter(o => o.type === 'lighting').length;
      document.getElementById('orbs-collected').textContent = gameState.orbsCollected;
      document.getElementById('orbs-total').textContent = total;
      const pct = total > 0 ? (gameState.orbsCollected / total) * 100 : 0;
      document.getElementById('orb-goal-fill').style.width = pct + '%';
      const completeEl = document.getElementById('orb-complete');
      completeEl.style.display = (total > 0 && gameState.orbsCollected >= total) ? 'block' : 'none';
    } else {
      sdCoins.style.display = 'none';
      sdOrbs.style.display  = 'none';
    }
  } else {
    sdCoins.style.display = 'none';
    sdOrbs.style.display  = 'none';
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
let lastTime = performance.now();

function gameLoop() {
  requestAnimationFrame(gameLoop);
  
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  
  if (panelOpen) updateFromPanel();
  
  gameState.time += dt;
  
  updatePlayer(dt);
  updateObstacles(dt);
  updateCamera(dt);
  updateParticles(dt);
  updateRain(dt);
  updateAltitudeZone();
  updateHUD();
  
  // Update clouds
  gameState.clouds.forEach(cloud => {
    cloud.mesh.position.x += cloud.vel * configs.atmosphere.clouds.driftSpeed * dt;
    if (cloud.mesh.position.x > 20) cloud.mesh.position.x = -20;
  });
  
  // Lightning effect (surprise!)
  if (configs.atmosphere.clouds.enabled && configs.atmosphere.clouds.lightning.enabled) {
    if (Math.random() < configs.atmosphere.clouds.lightning.frequency * dt) {
      const flash = new THREE.AmbientLight(0xffffff, 2);
      scene.add(flash);
      setTimeout(() => scene.remove(flash), configs.atmosphere.clouds.lightning.flashDuration * 1000);
    }
  }
  
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  await loadConfigs();
  buildPanel();
  
  createPlayer();

  // Ground plane
  const groundGeom = new THREE.BoxGeometry(24, 0.6, 3);
  const groundMat = new THREE.MeshStandardMaterial({ color: '#4a6741', roughness: 0.95, metalness: 0 });
  const groundMesh = new THREE.Mesh(groundGeom, groundMat);
  groundMesh.position.set(0, -0.3, 0);
  scene.add(groundMesh);

  spawnObstacles();
  createClouds();
  
  // Initial climb segments (start with 10 segments)
  for (let i = 0; i < 10; i++) {
    const seg = generateClimbSegment(i * configs.climbStructure.generation.segmentHeight);
    gameState.climbSegments.push(seg);
    gameState.segmentCount++;
  }
  
  // Set first checkpoint
  gameState.nextCheckpoint = configs.climbStructure.generation.segmentHeight * 8;
  gameState.nextObstacleSpawnY = configs.climbStructure.generation.segmentHeight * 11; // first batch after initial y=5..35
  
  gameLoop();
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
