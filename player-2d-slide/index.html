<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2D Platformer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #game-canvas { display: block; }

  /* ─── Config Panel ─── */
  #config-panel {
    position: fixed;
    left: 0; top: 0;
    width: 340px; height: 100vh;
    background: rgba(10, 10, 30, 0.92);
    backdrop-filter: blur(10px);
    border-right: 1px solid rgba(255,255,255,0.08);
    display: none;
    flex-direction: column;
    z-index: 20;
    overflow: hidden;
  }
  #config-panel.open { display: flex; }

  .cfg-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 14px 8px;
    flex-shrink: 0;
  }
  .cfg-header span:first-child {
    color: #7f8fa6;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .cfg-hint {
    color: #555;
    font-size: 9px;
    letter-spacing: 1px;
  }

  .cfg-tabs {
    display: flex;
    gap: 2px;
    padding: 0 10px;
    flex-shrink: 0;
  }
  .cfg-tab {
    flex: 1;
    padding: 6px 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    color: #7f8fa6;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .cfg-tab:hover { background: rgba(255,255,255,0.06); }
  .cfg-tab.active {
    background: rgba(232,101,43,0.12);
    border-color: rgba(232,101,43,0.4);
    color: #e8652b;
  }

  .cfg-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 14px 14px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .cfg-body::-webkit-scrollbar { width: 5px; }
  .cfg-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .cfg-section {
    color: #7f8fa6;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin: 14px 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .cfg-section:first-child { margin-top: 6px; }

  .cfg-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 4px 0;
  }
  .cfg-row label {
    flex: 0 0 95px;
    color: #8a9ab5;
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cfg-row input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
  }
  .cfg-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: #e8652b;
    border-radius: 50%;
    cursor: pointer;
  }
  .cfg-val {
    flex: 0 0 38px;
    text-align: right;
    color: #aaa;
    font-size: 10px;
    font-family: monospace;
  }

  .cfg-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 5px 0;
  }
  .cfg-toggle label {
    color: #8a9ab5;
    font-size: 10px;
    flex: 0 0 95px;
  }
  .cfg-check {
    -webkit-appearance: none;
    appearance: none;
    width: 32px; height: 16px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    outline: none;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .cfg-check:checked { background: rgba(232,101,43,0.4); }
  .cfg-check::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #666;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .cfg-check:checked::after { left: 18px; background: #e8652b; }

  .cfg-select {
    flex: 1;
    padding: 4px 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: #aaa;
    font-size: 10px;
    outline: none;
    cursor: pointer;
  }
  .cfg-select:focus { border-color: rgba(232,101,43,0.5); }
  .cfg-select option { background: #1a1a2e; color: #aaa; }

  .cfg-action-btn {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    background: rgba(136,84,208,0.15);
    border: 1px solid rgba(136,84,208,0.4);
    border-radius: 6px;
    color: #8854d0;
    font-size: 10px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .cfg-action-btn:hover { background: rgba(136,84,208,0.25); }

  .cfg-color-tool {
    margin: 6px 0;
    padding: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
  }

  #export-btn {
    margin: 8px 14px 14px;
    padding: 10px;
    background: rgba(232,101,43,0.15);
    border: 1px solid rgba(232,101,43,0.4);
    border-radius: 6px;
    color: #e8652b;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  #export-btn:hover { background: rgba(232,101,43,0.25); }

  /* ─── HUD ─── */
  #hud {
    position: fixed;
    left: 20px; top: 20px;
    color: #7f8fa6;
    font-size: 12px;
    z-index: 10;
    pointer-events: none;
    transition: left 0.3s;
  }
  #health-bar {
    margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  #health-bar-inner {
    width: 120px; height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
  }
  #health-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #ff6b6b, #ee5a24);
    border-radius: 5px;
    transition: width 0.3s;
  }

  #svg-overlay {
    position: fixed;
    left: 0; top: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<div id="hud">
  <div>ARROWS: Move &nbsp; SPACE: Jump &nbsp; P: Config</div>
  <div id="health-bar">
    <span>HP</span>
    <div id="health-bar-inner"><div id="health-fill"></div></div>
    <span id="health-text">5</span>
  </div>
</div>

<div id="config-panel">
  <div class="cfg-header">
    <span>Config</span>
    <span class="cfg-hint">P to toggle</span>
  </div>
  <div class="cfg-tabs" id="cfg-tabs"></div>
  <div class="cfg-body" id="cfg-body"></div>
  <button id="export-btn">Export JSON</button>
</div>

<svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
<canvas id="game-canvas"></canvas>

<script src="../tools/colorMaps/colorWheel.js"></script>
<script src="../tools/colorMaps/colorInput.js"></script>
<script src="../tools/colorMaps/colorSwatches.js"></script>
<script src="../tools/colorMaps/colorHarmony.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════
//  DEFAULT CONFIGS (overwritten by JSON on load)
// ═══════════════════════════════════════════════════════════
const configs = {
  physics: {
    version: '1.0', name: 'Player Physics',
    movement: { speed: 10, gravity: -32, jumpVelocity: 15, playerSize: 1, coyoteTime: 0.12, jumpBuffer: 0.15 },
    health: { maxHP: 5, damageCooldown: 1.0, hurtFlashDuration: 0.5, knockbackForce: 2, bounceMultiplier: 0.5 },
    squashStretch: { enabled: true, groundSquash: 0.01, airStretch: 0.005, tiltAmount: 0.02 },
    exportedAt: null
  },
  entities: {
    version: '1.0', name: 'Entity Behavior',
    passive: {
      count: 5, bobSpeed: 1.5, bobHeight: 0.05,
      squashOnLand: { scaleY: 0.6, scaleX: 1.4, recoverMs: 250 },
      sizeRange: { widthMin: 1.0, widthMax: 1.8, heightMin: 0.8, heightMax: 2.3 }
    },
    harmful: {
      count: 5, bobSpeed: 2.5, bobHeight: 0.08,
      wobbleSpeed: 3, wobbleAngle: 0.05, pulseSpeed: 4,
      emissiveBase: 0.2, emissivePulse: 0.15,
      squashOnLand: { scaleY: 0.5, scaleX: 1.5, recoverMs: 300 },
      sizeRange: { widthMin: 0.9, widthMax: 1.5, heightMin: 0.7, heightMax: 1.7 }
    },
    interactive: { count: 4, floatSpeed: 2, floatHeight: 0.08, glowIntensity: 0.6, glowPulseSpeed: 4, glowPulseDelta: 0.2, carrySpeedFactor: 0.5 },
    bird: { speedMin: 1.5, speedMax: 3.5, liftMin: 2, liftMax: 3.5, flapRate: 12, flapAngle: 0.5, lifespan: 4 },
    exportedAt: null
  },
  particles: {
    version: '1.0', name: 'Particle Effects',
    dustTrail: { enabled: true, count: 2, spawnInterval: 0.08, radiusMin: 2, radiusMax: 5, velocityX: 30, velocityYMin: -15, velocityYMax: -40, lifetimeMin: 0.4, lifetimeMax: 0.7 },
    dustBurst: { count: 8, radiusMin: 3, radiusMax: 8, velocityX: 100, velocityYMin: -20, velocityYMax: -70, lifetimeMin: 0.5, lifetimeMax: 0.9 },
    enemyLandFX: { enabled: true, symbolCount: 6, symbols: ['!','?','*','#','+'], colors: ['#8854d0','#a55eea','#64c8ff','#ff9ff3','#feca57'], velocity: 90, lifetime: 0.9, starburstOuter: 22, starburstInner: 9, starburstLifetime: 0.5 },
    damage: { enabled: true, shockwaveCount: 3, shockwaveMaxRadius: 80, shockwaveLifetime: 0.6, shockwaveColors: ['#ff4444','#ff8800','#ffcc00'], skullCount: 8, skullVelocityMin: 60, skullVelocityMax: 120, skullLifetime: 1.0, lightningCount: 4, lightningSegments: 4, lightningLifetimeMin: 0.3, lightningLifetimeMax: 0.5, textSize: 28, textVelocityY: -60, textLifetime: 1.2, vignetteOpacity: 0.25, vignetteLifetime: 0.3, screenShakeDuration: 0.4 },
    interactiveFX: { enabled: true, glowOnRadius: 25, glowOffRadius: 15, glowLifetime: 0.5, sparkleCount: 3, sparkleVelocityX: 40, sparkleVelocityYMin: -30, sparkleVelocityYMax: -50, sparkleLifetime: 0.7 },
    exportedAt: null
  },
  camera: {
    version: '1.0', name: 'Camera Rig',
    view: { frustumHeight: 20, followSmoothing: 0.08, baseY: 2 },
    screenShake: { duration: 0.4, intensity: 8 },
    ambientLight: { color: '#8899bb', intensity: 0.6 },
    directionalLight: { color: '#ffeedd', intensity: 0.8, posX: 5, posY: 10, posZ: 8 },
    background: { clearColor: '#16213e', starCount: 30, starSizeMin: 0.05, starSizeMax: 0.2, starOpacityMin: 0.2, starOpacityMax: 0.7 },
    exportedAt: null
  },
  atmosphere: {
    version: '1.0', name: 'Atmosphere',
    weather: { enabled: true, type: 'fireflies', density: 20, speedMin: 10, speedMax: 30, driftX: 5, driftY: 2, opacityMin: 0.3, opacityMax: 0.8, sizeMin: 1, sizeMax: 4, color: '#feca57', colorTool: 'colorWheel', pulseSpeed: 3 },
    playerTrail: { enabled: true, ghostCount: 4, ghostSpacing: 0.06, fadeRate: 0.25, color: '#64c8ff', colorTool: 'colorWheel' },
    timeWarp: { enabled: true, triggerOn: 'enemyLand', slowFactor: 0.3, duration: 0.6, easeBack: 0.3 },
    exportedAt: null
  }
};

// ═══════════════════════════════════════════════════════════
//  LOAD CONFIGS FROM JSON
// ═══════════════════════════════════════════════════════════
async function loadConfigs() {
  const files = {
    physics: 'playerPhysics.json',
    entities: 'entityBehavior.json',
    particles: 'particleFX.json',
    camera: 'cameraRig.json',
    atmosphere: 'atmosphere.json'
  };
  for (const [key, file] of Object.entries(files)) {
    try {
      const resp = await fetch(file);
      if (resp.ok) configs[key] = await resp.json();
    } catch (e) { /* use defaults */ }
  }
}

// ═══════════════════════════════════════════════════════════
//  PANEL STATE
// ═══════════════════════════════════════════════════════════
let panelOpen = false;
let activeTab = 'physics';
const panel = document.getElementById('config-panel');
const tabsEl = document.getElementById('cfg-tabs');
const bodyEl = document.getElementById('cfg-body');
const exportBtn = document.getElementById('export-btn');
const hudEl = document.getElementById('hud');

// ═══════════════════════════════════════════════════════════
//  PANEL BUILDER HELPERS
// ═══════════════════════════════════════════════════════════
function addSection(parent, title) {
  const h = document.createElement('div');
  h.className = 'cfg-section';
  h.textContent = title;
  parent.appendChild(h);
}

function addSlider(parent, label, cfgPath, min, max, step, opts = {}) {
  const row = document.createElement('div');
  row.className = 'cfg-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'range';
  inp.min = min; inp.max = max; inp.step = step;
  inp.dataset.cfg = cfgPath;
  if (opts.negate) inp.dataset.negate = '1';
  const val = document.createElement('span');
  val.className = 'cfg-val';
  inp.addEventListener('input', () => {
    val.textContent = inp.value;
    readPanelToConfig();
  });
  row.appendChild(lbl);
  row.appendChild(inp);
  row.appendChild(val);
  parent.appendChild(row);
}

function addToggle(parent, label, cfgPath) {
  const row = document.createElement('div');
  row.className = 'cfg-toggle';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  inp.className = 'cfg-check';
  inp.dataset.cfg = cfgPath;
  inp.addEventListener('change', () => readPanelToConfig());
  row.appendChild(lbl);
  row.appendChild(inp);
  parent.appendChild(row);
}

function addDropdown(parent, label, cfgPath, options) {
  const row = document.createElement('div');
  row.className = 'cfg-row';
  const lbl = document.createElement('label');
  lbl.textContent = label;
  const sel = document.createElement('select');
  sel.className = 'cfg-select';
  sel.dataset.cfg = cfgPath;
  options.forEach(([value, text]) => {
    const opt = document.createElement('option');
    opt.value = value; opt.textContent = text;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    readPanelToConfig();
    mountColorTools();
  });
  row.appendChild(lbl);
  row.appendChild(sel);
  parent.appendChild(row);
}

function addActionBtn(parent, label, onClick) {
  const btn = document.createElement('button');
  btn.className = 'cfg-action-btn';
  btn.textContent = label;
  btn.addEventListener('click', onClick);
  parent.appendChild(btn);
}

// ═══════════════════════════════════════════════════════════
//  BUILD CONFIG PANEL
// ═══════════════════════════════════════════════════════════
const TABS = [
  { id: 'physics', label: 'Physics' },
  { id: 'entities', label: 'Entities' },
  { id: 'particles', label: 'Particles' },
  { id: 'camera', label: 'Camera' },
  { id: 'atmosphere', label: 'Atmos' }
];
const tabContents = {};

function buildPanel() {
  TABS.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'cfg-tab' + (tab.id === 'physics' ? ' active' : '');
    btn.textContent = tab.label;
    btn.dataset.tab = tab.id;
    btn.addEventListener('click', () => switchTab(tab.id));
    tabsEl.appendChild(btn);
  });

  TABS.forEach(tab => {
    const div = document.createElement('div');
    div.style.display = tab.id === 'physics' ? 'block' : 'none';
    tabContents[tab.id] = div;
    bodyEl.appendChild(div);
  });

  buildPhysicsTab();
  buildEntitiesTab();
  buildParticlesTab();
  buildCameraTab();
  buildAtmosphereTab();
}

function switchTab(id) {
  tabsEl.querySelectorAll('.cfg-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  Object.entries(tabContents).forEach(([key, div]) => { div.style.display = key === id ? 'block' : 'none'; });
  activeTab = id;
  mountColorTools();
}

// ── Physics Tab ──
function buildPhysicsTab() {
  const t = tabContents.physics;
  addSection(t, 'Movement');
  addSlider(t, 'Speed', 'physics.movement.speed', 1, 30, 0.5);
  addSlider(t, 'Gravity', 'physics.movement.gravity', 5, 60, 1, { negate: true });
  addSlider(t, 'Jump Velocity', 'physics.movement.jumpVelocity', 5, 30, 0.5);
  addSlider(t, 'Player Size', 'physics.movement.playerSize', 0.5, 3, 0.1);
  addSlider(t, 'Coyote Time', 'physics.movement.coyoteTime', 0, 0.5, 0.01);
  addSlider(t, 'Jump Buffer', 'physics.movement.jumpBuffer', 0, 0.5, 0.01);

  addSection(t, 'Health');
  addSlider(t, 'Max HP', 'physics.health.maxHP', 1, 20, 1);
  addSlider(t, 'Dmg Cooldown', 'physics.health.damageCooldown', 0.1, 5, 0.1);
  addSlider(t, 'Hurt Flash', 'physics.health.hurtFlashDuration', 0.1, 2, 0.1);
  addSlider(t, 'Knockback', 'physics.health.knockbackForce', 0, 10, 0.5);
  addSlider(t, 'Bounce Mult', 'physics.health.bounceMultiplier', 0, 1, 0.05);

  addSection(t, 'Squash & Stretch');
  addToggle(t, 'Enabled', 'physics.squashStretch.enabled');
  addSlider(t, 'Ground Squash', 'physics.squashStretch.groundSquash', 0, 0.05, 0.001);
  addSlider(t, 'Air Stretch', 'physics.squashStretch.airStretch', 0, 0.02, 0.001);
  addSlider(t, 'Tilt Amount', 'physics.squashStretch.tiltAmount', 0, 0.1, 0.005);
}

// ── Entities Tab ──
function buildEntitiesTab() {
  const t = tabContents.entities;
  addActionBtn(t, 'Rebuild Level', () => { clearLevel(); generateLevel(); });

  addSection(t, 'Passive Enemies');
  addSlider(t, 'Count', 'entities.passive.count', 0, 15, 1);
  addSlider(t, 'Bob Speed', 'entities.passive.bobSpeed', 0, 5, 0.1);
  addSlider(t, 'Bob Height', 'entities.passive.bobHeight', 0, 0.3, 0.01);
  addSlider(t, 'Squash Y', 'entities.passive.squashOnLand.scaleY', 0.2, 1, 0.05);
  addSlider(t, 'Squash X', 'entities.passive.squashOnLand.scaleX', 1, 2, 0.05);
  addSlider(t, 'Recover (ms)', 'entities.passive.squashOnLand.recoverMs', 50, 1000, 50);

  addSection(t, 'Harmful Enemies');
  addSlider(t, 'Count', 'entities.harmful.count', 0, 15, 1);
  addSlider(t, 'Bob Speed', 'entities.harmful.bobSpeed', 0, 6, 0.1);
  addSlider(t, 'Bob Height', 'entities.harmful.bobHeight', 0, 0.3, 0.01);
  addSlider(t, 'Wobble Speed', 'entities.harmful.wobbleSpeed', 0, 8, 0.5);
  addSlider(t, 'Wobble Angle', 'entities.harmful.wobbleAngle', 0, 0.2, 0.01);
  addSlider(t, 'Pulse Speed', 'entities.harmful.pulseSpeed', 0, 10, 0.5);
  addSlider(t, 'Emissive Base', 'entities.harmful.emissiveBase', 0, 1, 0.05);
  addSlider(t, 'Emissive Pulse', 'entities.harmful.emissivePulse', 0, 0.5, 0.05);
  addSlider(t, 'Squash Y', 'entities.harmful.squashOnLand.scaleY', 0.2, 1, 0.05);
  addSlider(t, 'Squash X', 'entities.harmful.squashOnLand.scaleX', 1, 2, 0.05);
  addSlider(t, 'Recover (ms)', 'entities.harmful.squashOnLand.recoverMs', 50, 1000, 50);

  addSection(t, 'Interactive');
  addSlider(t, 'Count', 'entities.interactive.count', 0, 10, 1);
  addSlider(t, 'Float Speed', 'entities.interactive.floatSpeed', 0, 6, 0.1);
  addSlider(t, 'Float Height', 'entities.interactive.floatHeight', 0, 0.3, 0.01);
  addSlider(t, 'Glow Intensity', 'entities.interactive.glowIntensity', 0, 2, 0.1);
  addSlider(t, 'Glow Pulse Spd', 'entities.interactive.glowPulseSpeed', 0, 10, 0.5);
  addSlider(t, 'Glow Pulse Δ', 'entities.interactive.glowPulseDelta', 0, 0.5, 0.05);
  addSlider(t, 'Carry Speed', 'entities.interactive.carrySpeedFactor', 0, 1, 0.05);

  addSection(t, 'Bird');
  addSlider(t, 'Speed Min', 'entities.bird.speedMin', 0.5, 6, 0.1);
  addSlider(t, 'Speed Max', 'entities.bird.speedMax', 1, 8, 0.1);
  addSlider(t, 'Lift Min', 'entities.bird.liftMin', 0.5, 6, 0.1);
  addSlider(t, 'Lift Max', 'entities.bird.liftMax', 1, 8, 0.1);
  addSlider(t, 'Flap Rate', 'entities.bird.flapRate', 2, 30, 1);
  addSlider(t, 'Flap Angle', 'entities.bird.flapAngle', 0.1, 1.5, 0.05);
  addSlider(t, 'Lifespan', 'entities.bird.lifespan', 1, 10, 0.5);
}

// ── Particles Tab ──
function buildParticlesTab() {
  const t = tabContents.particles;

  addSection(t, 'Dust Trail');
  addToggle(t, 'Enabled', 'particles.dustTrail.enabled');
  addSlider(t, 'Count', 'particles.dustTrail.count', 1, 10, 1);
  addSlider(t, 'Interval', 'particles.dustTrail.spawnInterval', 0.02, 0.3, 0.01);
  addSlider(t, 'Radius Min', 'particles.dustTrail.radiusMin', 1, 10, 0.5);
  addSlider(t, 'Radius Max', 'particles.dustTrail.radiusMax', 2, 15, 0.5);
  addSlider(t, 'Vel X', 'particles.dustTrail.velocityX', 5, 80, 1);

function getNestedVal(obj, path) {
  const parts = path.split('.');
  let v = obj;
  for (const p of parts) v = v[p];
  return v;
}

function setNestedVal(obj, path, val) {
  const parts = path.split('.');
  let o = obj;
  for (let i = 0; i < parts.length - 1; i++) o = o[parts[i]];
  o[parts[parts.length - 1]] = val;
}

function syncPanelFromConfig() {
  document.querySelectorAll('[data-cfg]').forEach(el => {
    const val = getNestedVal(configs, el.dataset.cfg);
    if (el.type === 'checkbox') {
      el.checked = val;
    } else if (el.tagName === 'SELECT') {
      el.value = val;
    } else {
      const display = el.dataset.negate ? Math.abs(val) : val;
      el.value = display;
      const valSpan = el.nextElementSibling;
      if (valSpan && valSpan.classList.contains('cfg-val')) valSpan.textContent = display;
    }
  });
  mountColorTools();
}

function readPanelToConfig() {
  document.querySelectorAll('[data-cfg]').forEach(el => {
    if (el.type === 'checkbox') {
      setNestedVal(configs, el.dataset.cfg, el.checked);
    } else if (el.tagName === 'SELECT') {
      setNestedVal(configs, el.dataset.cfg, el.value);
    } else {
      let v = parseFloat(el.value);
      if (el.dataset.negate) v = -v;
      setNestedVal(configs, el.dataset.cfg, v);
    }
  });
  applyCameraConfig();
  applyHealthConfig();
}

let weatherColorInst = null;
let trailColorInst = null;

function mountColorTools() {
  const tools = window.ColorMaps || {};

  // Weather color tool
  const wContainer = document.getElementById('weather-color-tool');
  if (activeTab === 'atmosphere' && wContainer) {
    if (weatherColorInst && weatherColorInst.destroy) weatherColorInst.destroy();
    wContainer.innerHTML = '';
    const toolKey = configs.atmosphere.weather.colorTool;
    const toolDef = tools[toolKey];
    if (toolDef && toolDef.create) {
      weatherColorInst = toolDef.create(wContainer, {
        color: configs.atmosphere.weather.color,
        onChange: (color) => { configs.atmosphere.weather.color = color; }
      });
    }
  }

  // Trail color tool
  const tContainer = document.getElementById('trail-color-tool');
  if (activeTab === 'atmosphere' && tContainer) {
    if (trailColorInst && trailColorInst.destroy) trailColorInst.destroy();
    tContainer.innerHTML = '';
    const toolKey = configs.atmosphere.playerTrail.colorTool;
    const toolDef = tools[toolKey];
    if (toolDef && toolDef.create) {
      trailColorInst = toolDef.create(tContainer, {
        color: configs.atmosphere.playerTrail.color,
        onChange: (color) => { configs.atmosphere.playerTrail.color = color; }
      });
    }
  }
}

function applyCameraConfig() {
  const cfg = configs.camera;
  const aspect = getGameWidth() / window.innerHeight;
  threeCamera.left = -cfg.view.frustumHeight * aspect / 2;
  threeCamera.right = cfg.view.frustumHeight * aspect / 2;
  threeCamera.top = cfg.view.frustumHeight / 2;
  threeCamera.bottom = -cfg.view.frustumHeight / 2;
  threeCamera.updateProjectionMatrix();
  cameraBasePos.y = cfg.view.baseY;
  ambient.color.set(cfg.ambientLight.color);
  ambient.intensity = cfg.ambientLight.intensity;
  dirLight.color.set(cfg.directionalLight.color);
  dirLight.intensity = cfg.directionalLight.intensity;
  dirLight.position.set(cfg.directionalLight.posX, cfg.directionalLight.posY, cfg.directionalLight.posZ);
  renderer.setClearColor(cfg.background.clearColor);
}

function applyHealthConfig() {
  const maxHP = configs.physics.health.maxHP;
  if (playerState.hp > maxHP) playerState.hp = maxHP;
  updateHealthUI();
}

// ═══════════════════════════════════════════════════════════
//  LEVEL GENERATION
// ═══════════════════════════════════════════════════════════
const obstacles = [];
const enemies = [];
const interactives = [];
const birds = [];

function clearLevel() {
  for (const obs of obstacles) scene.remove(obs);
  for (const ene of enemies) scene.remove(ene);
  for (const inter of interactives) scene.remove(inter);
  for (const b of birds) scene.remove(b.group);
  obstacles.length = 0;
  enemies.length = 0;
  interactives.length = 0;
  birds.length = 0;
  carriedPlatform = null;
}

function generateLevel() {
  let seed = 42;
  function sr() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

  const startX = -2;
  const eCfg = configs.entities;
  const pSize = configs.physics.movement.playerSize;

  // Passive enemies (purple)
  for (let i = 0; i < eCfg.passive.count; i++) {
    const sz = eCfg.passive.sizeRange;
    const w = sz.widthMin + sr() * (sz.widthMax - sz.widthMin);
    const h = sz.heightMin + sr() * (sz.heightMax - sz.heightMin);
    const geo = new THREE.BoxGeometry(w, h, 1);
    const obs = new THREE.Mesh(geo, matPassiveEnemy.clone());
    const x = startX + i * 7 + sr() * 2;
    obs.position.set(x, GROUND_Y + h / 2, 0);
    obs.userData = { type: 'passive', w, h, surprised: false, baseY: GROUND_Y + h / 2 };
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
    const eyeR = eyeL.clone();
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 6), new THREE.MeshBasicMaterial({ color: 0x000000 }));
    const pupilR = pupilL.clone();
    eyeL.position.set(-w * 0.2, h * 0.25, 0.55);
    eyeR.position.set(w * 0.2, h * 0.25, 0.55);
    pupilL.position.set(-w * 0.2, h * 0.25, 0.62);
    pupilR.position.set(w * 0.2, h * 0.25, 0.62);
    obs.add(eyeL); obs.add(eyeR); obs.add(pupilL); obs.add(pupilR);
    scene.add(obs);
    obstacles.push(obs);
  }

  // Harmful enemies (red)
  for (let i = 0; i < eCfg.harmful.count; i++) {
    const sz = eCfg.harmful.sizeRange;
    const w = sz.widthMin + sr() * (sz.widthMax - sz.widthMin);
    const h = sz.heightMin + sr() * (sz.heightMax - sz.heightMin);
    const geo = new THREE.BoxGeometry(w, h, 1);
    const ene = new THREE.Mesh(geo, matEnemy.clone());
    const x = startX + 3.5 + i * 7 + sr() * 2;
    ene.position.set(x, GROUND_Y + h / 2, 0);
    ene.userData = { type: 'enemy', w, h, surprised: false, baseY: GROUND_Y + h / 2 };
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    const eyeR = eyeL.clone();
    eyeL.position.set(-w * 0.2, h * 0.25, 0.55);
    eyeR.position.set(w * 0.2, h * 0.25, 0.55);
    ene.add(eyeL); ene.add(eyeR);
    for (let s = 0; s < 3; s++) {
      const spike = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.25, 4), new THREE.MeshStandardMaterial({ color: 0xff2222 }));
      spike.position.set(-w * 0.3 + s * w * 0.3, h * 0.5 + 0.12, 0);
      ene.add(spike);
    }
    scene.add(ene);
    enemies.push(ene);
  }

  // Interactives (yellow)
  for (let i = 0; i < eCfg.interactive.count; i++) {
    const geo = new THREE.BoxGeometry(1.2, 1.2, 1);
    const inter = new THREE.Mesh(geo, matInteractive.clone());
    const x = startX + 1 + i * 9 + sr() * 3;
    inter.position.set(x, GROUND_Y + 0.6, 0);
    inter.userData = { type: 'interactive', lightOn: false, originalY: GROUND_Y + 0.6, carrying: false, flyingAway: false, w: 1.2, h: 1.2 };
    scene.add(inter);
    interactives.push(inter);
  }

  // Reset player
  player.position.set(-8, GROUND_Y + pSize / 2, 0);
  playerState.vy = 0;
  playerState.vx = 0;
  playerState.grounded = false;
  playerState.hp = configs.physics.health.maxHP;
  playerState.damageCooldown = 0;
  updateHealthUI();
}

const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'KeyP') {
    panelOpen = !panelOpen;
    panel.classList.toggle('open', panelOpen);
    const gw = getGameWidth();
    renderer.setSize(gw, window.innerHeight);
    aspect = gw / window.innerHeight;
    applyCameraConfig();
    hudEl.style.left = panelOpen ? '360px' : '20px';
    if (panelOpen) { syncPanelFromConfig(); mountColorTools(); }
    e.preventDefault();
    return;
  }
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  keys[e.code] = false;
});

// ═══════════════════════════════════════════════════════════
//  SVG PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════
const svgOverlay = document.getElementById('svg-overlay');
const particles = [];

function worldToScreen(wx, wy) {
  const v = new THREE.Vector3(wx, wy, 0);
  v.project(threeCamera);
  const gw = getGameWidth();
  return {
    x: (v.x * 0.5 + 0.5) * gw + (panelOpen ? 340 : 0),
    y: (-v.y * 0.5 + 0.5) * window.innerHeight
  };
}

function spawnDustTrail(worldX, worldY) {
  const cfg = configs.particles.dustTrail;
  if (!cfg.enabled) return;
  for (let i = 0; i < cfg.count; i++) {
    const pos = worldToScreen(worldX + (Math.random() - 0.5) * 0.5, worldY);
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    el.setAttribute('cx', pos.x); el.setAttribute('cy', pos.y);
    el.setAttribute('r', cfg.radiusMin + Math.random() * (cfg.radiusMax - cfg.radiusMin));
    el.setAttribute('fill', 'rgba(180,170,150,0.5)');
    svgOverlay.appendChild(el);
    particles.push({
      el, x: pos.x, y: pos.y,
      vx: (Math.random() - 0.5) * cfg.velocityX,
      vy: cfg.velocityYMin + Math.random() * (cfg.velocityYMax - cfg.velocityYMin),
      life: cfg.lifetimeMin + Math.random() * (cfg.lifetimeMax - cfg.lifetimeMin),
      age: 0, type: 'dust'
    });
  }

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.life) { p.el.remove(); particles.splice(i, 1); continue; }
    const t = p.age / p.life;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.type === 'dust') {
      p.el.setAttribute('cx', p.x); p.el.setAttribute('cy', p.y);
      p.el.setAttribute('r', Math.max(0, (1 - t) * 5));
      p.el.setAttribute('fill', `rgba(180,170,150,${(1 - t) * 0.7})`);
    } else if (p.type === 'surprise' || p.type === 'sparkle') {
      p.el.setAttribute('x', p.x); p.el.setAttribute('y', p.y);
      p.el.setAttribute('opacity', 1 - t);
    } else if (p.type === 'starburst') {
      const s = 1 + t * 1.5;
      p.el.setAttribute('transform', `translate(${p.x},${p.y}) scale(${s}) translate(${-p.x},${-p.y})`);
      p.el.setAttribute('opacity', 1 - t);
    } else if (p.type === 'glow') {
      const r = p.expanding ? 25 + t * 30 : 15 - t * 10;
      p.el.setAttribute('r', Math.max(0, r));
      p.el.setAttribute('opacity', 1 - t);
    } else if (p.type === 'shockwave') {
      const effectiveT = Math.max(0, (p.age - (p.startDelay || 0)) / (p.life - (p.startDelay || 0)));
      if (effectiveT > 0) {
        const r = 5 + effectiveT * (p.maxRadius || 80);
        p.el.setAttribute('r', r);
        p.el.setAttribute('stroke-width', Math.max(0.5, 3 * (1 - effectiveT)));
        p.el.setAttribute('opacity', 1 - effectiveT);
      }
    } else if (p.type === 'lightning') {
      p.el.setAttribute('opacity', 1 - t * t);
      p.el.setAttribute('stroke-width', Math.max(0.5, 2 * (1 - t)));
    } else if (p.type === 'dmgtext') {
      p.el.setAttribute('x', p.x); p.el.setAttribute('y', p.y);
      const scale = 1 + t * 0.5;
      p.el.setAttribute('font-size', (p.baseSize || 28) * scale);
      p.el.setAttribute('opacity', 1 - t * 0.8);
    } else if (p.type === 'vignette') {
      p.el.setAttribute('fill', `rgba(255,0,0,${(p.baseOpacity || 0.25) * (1 - t)})`);
    }
  }
}

//  COLLISION HELPERS
// ═══════════════════════════════════════════════════════════
function boxOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return Math.abs(ax - bx) < (aw + bw) / 2 && Math.abs(ay - by) < (ah + bh) / 2;
}
function isLandingOnTop(playerPrevY, obsY, oh) {
  const pSize = configs.physics.movement.playerSize;
  const obsTop = obsY + oh / 2;
  const prevBottom = playerPrevY - pSize / 2;
  return prevBottom >= obsTop - 0.3;
}

function createBird(x, y) {
  const bCfg = configs.entities.bird;
  const birdGroup = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 6), new THREE.MeshStandardMaterial({ color: 0xfeca57, roughness: 0.5 }));
  birdGroup.add(body);
  const wingGeo = new THREE.BoxGeometry(0.6, 0.05, 0.3);
  const wingMat = new THREE.MeshStandardMaterial({ color: 0xf0c040 });
  const leftWing = new THREE.Mesh(wingGeo, wingMat);
  leftWing.position.set(-0.35, 0, 0);
  birdGroup.add(leftWing);
  const rightWing = new THREE.Mesh(wingGeo, wingMat);
  rightWing.position.set(0.35, 0, 0);
  birdGroup.add(rightWing);
  birdGroup.position.set(x, y, 0);
  scene.add(birdGroup);
  birds.push({
    group: birdGroup, leftWing, rightWing,
    vx: bCfg.speedMin + Math.random() * (bCfg.speedMax - bCfg.speedMin),
    vy: bCfg.liftMin + Math.random() * (bCfg.liftMax - bCfg.liftMin),
    age: 0, life: bCfg.lifespan
  });
}

function updateBirds(dt) {
  const bCfg = configs.entities.bird;
  for (let i = birds.length - 1; i >= 0; i--) {
    const b = birds[i];
    b.age += dt;
    if (b.age > b.life) { scene.remove(b.group); birds.splice(i, 1); continue; }
    b.group.position.x += b.vx * dt;
    b.group.position.y += b.vy * dt;
    const flap = Math.sin(b.age * bCfg.flapRate) * bCfg.flapAngle;
    b.leftWing.rotation.z = flap;
    b.rightWing.rotation.z = -flap;
    const fade = Math.max(0, 1 - (b.age / b.life));
    b.group.children.forEach(c => { if (c.material) { c.material.opacity = fade; c.material.transparent = true; } });
  }
}

function spawnWeatherParticle() {

    el.setAttribute('stroke-width', '1');
    el.setAttribute('opacity', cfg.opacityMin + Math.random() * (cfg.opacityMax - cfg.opacityMin));
  } else {
    el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    el.setAttribute('cx', x); el.setAttribute('cy', y);
    el.setAttribute('r', cfg.sizeMin + Math.random() * (cfg.sizeMax - cfg.sizeMin));
    el.setAttribute('fill', cfg.color);
    el.setAttribute('opacity', cfg.opacityMin + Math.random() * (cfg.opacityMax - cfg.opacityMin));
  }
  svgOverlay.appendChild(el);
  const speed = cfg.speedMin + Math.random() * (cfg.speedMax - cfg.speedMin);
  weatherParts.push({
    el, x, y,
    vx: cfg.type === 'rain' ? cfg.driftX : (Math.random() - 0.5) * cfg.driftX,
    vy: (cfg.type === 'fireflies' || cfg.type === 'dustMotes') ? (Math.random() - 0.5) * speed * 0.3 : speed,
    type: cfg.type,
    phase: Math.random() * Math.PI * 2,
    baseOpacity: cfg.opacityMin + Math.random() * (cfg.opacityMax - cfg.opacityMin)
  });
}

function updateWeather(dt) {
  const cfg = configs.atmosphere.weather;
  if (!cfg.enabled) {
    weatherParts.forEach(p => p.el.remove());
    weatherParts.length = 0;
    return;
  }
  while (weatherParts.length < cfg.density) spawnWeatherParticle();
  while (weatherParts.length > cfg.density) { weatherParts.pop().el.remove(); }

  const gw = window.innerWidth;
  const gh = window.innerHeight;

  for (const p of weatherParts) {
    p.phase += dt * cfg.pulseSpeed;

    switch (p.type) {
      case 'fireflies':
        p.x += (Math.sin(p.phase) * cfg.driftX + (Math.random() - 0.5) * 20) * dt;
        p.y += (Math.cos(p.phase * 0.7) * cfg.driftY + (Math.random() - 0.5) * 10) * dt;
        p.el.setAttribute('opacity', p.baseOpacity * (0.5 + 0.5 * Math.sin(p.phase)));
        break;
      case 'rain':
        p.x += cfg.driftX * dt;
        p.y += p.vy * dt;
        break;
      case 'snow':
        p.x += Math.sin(p.phase) * 15 * dt;
        p.y += p.vy * dt;
        break;
      case 'dustMotes':
        p.x += Math.sin(p.phase * 0.5) * cfg.driftX * dt;
        p.y += Math.cos(p.phase * 0.3) * cfg.driftY * dt;
        p.el.setAttribute('opacity', p.baseOpacity * (0.5 + 0.5 * Math.sin(p.phase * 0.8)));
        break;
    }

    // Wrap around edges
    if (p.x < -10) p.x = gw + 10;
    if (p.x > gw + 10) p.x = -10;
    if (p.y < -10) p.y = gh + 10;
    if (p.y > gh + 10) p.y = -10;

    if (p.type === 'rain') {
      p.el.setAttribute('x1', p.x); p.el.setAttribute('y1', p.y);
      p.el.setAttribute('x2', p.x - 2); p.el.setAttribute('y2', p.y + 8);
    } else {
      p.el.setAttribute('cx', p.x); p.el.setAttribute('cy', p.y);
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  ATMOSPHERE: PLAYER TRAIL (GHOST AFTERIMAGES)
// ═══════════════════════════════════════════════════════════
const ghostMeshes = [];
const trailHistory = [];

function initGhosts() {
  const maxGhosts = 10;
  for (let i = 0; i < maxGhosts; i++) {
    const ghost = new THREE.Mesh(playerGeo, new THREE.MeshStandardMaterial({
      color: 0x64c8ff, transparent: true, opacity: 0, roughness: 0.3, metalness: 0.1
    }));
    ghost.visible = false;
    scene.add(ghost);
    ghostMeshes.push(ghost);
  }
}

function updateGhosts() {
  const cfg = configs.atmosphere.playerTrail;
  if (!cfg.enabled) {
    ghostMeshes.forEach(g => g.visible = false);
    return;
  }

  const now = performance.now() / 1000;
  trailHistory.push({ x: player.position.x, y: player.position.y, t: now });

  // Trim old entries
  const maxAge = cfg.ghostSpacing * cfg.ghostCount + 1;
  while (trailHistory.length > 0 && now - trailHistory[0].t > maxAge) trailHistory.shift();

  const ghostColor = new THREE.Color(cfg.color);

  for (let i = 0; i < ghostMeshes.length; i++) {
    if (i >= cfg.ghostCount) { ghostMeshes[i].visible = false; continue; }

    const targetTime = now - (i + 1) * cfg.ghostSpacing;
    let closest = null;
    for (let j = trailHistory.length - 1; j >= 0; j--) {
      if (trailHistory[j].t <= targetTime) { closest = trailHistory[j]; break; }
    }

    if (closest) {
      ghostMeshes[i].position.set(closest.x, closest.y, 0);
      ghostMeshes[i].visible = true;
      ghostMeshes[i].material.color.copy(ghostColor);
      ghostMeshes[i].material.opacity = cfg.fadeRate * (1 - i / cfg.ghostCount);
      ghostMeshes[i].scale.copy(player.scale);
    } else {
      ghostMeshes[i].visible = false;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  ATMOSPHERE: TIME WARP
// ═══════════════════════════════════════════════════════════
const timeWarpState = { active: false, factor: 1, timer: 0, easeTimer: 0 };
let timeWarpVignette = null;

function triggerTimeWarp() {
  const cfg = configs.atmosphere.timeWarp;
  if (!cfg.enabled || timeWarpState.active) return;
  timeWarpState.active = true;
  timeWarpState.factor = cfg.slowFactor;
  timeWarpState.timer = cfg.duration;
  timeWarpState.easeTimer = 0;

  if (timeWarpVignette) timeWarpVignette.remove();
  timeWarpVignette = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  timeWarpVignette.setAttribute('x', 0); timeWarpVignette.setAttribute('y', 0);
  timeWarpVignette.setAttribute('width', '100%'); timeWarpVignette.setAttribute('height', '100%');
  timeWarpVignette.setAttribute('fill', 'rgba(64,128,255,0.12)');
  svgOverlay.appendChild(timeWarpVignette);
}

function updateTimeWarp(rawDt) {
  if (!timeWarpState.active) {
    if (timeWarpVignette) { timeWarpVignette.remove(); timeWarpVignette = null; }
    return rawDt;
  }
  const cfg = configs.atmosphere.timeWarp;
  timeWarpState.timer -= rawDt;

  if (timeWarpState.timer <= 0) {
    timeWarpState.easeTimer += rawDt;
    const easeT = Math.min(1, timeWarpState.easeTimer / cfg.easeBack);
    timeWarpState.factor = cfg.slowFactor + (1 - cfg.slowFactor) * easeT * easeT;
    if (timeWarpVignette) {
      timeWarpVignette.setAttribute('fill', `rgba(64,128,255,${0.12 * (1 - easeT)})`);
    }
    if (easeT >= 1) {
      timeWarpState.active = false;
      timeWarpState.factor = 1;
      if (timeWarpVignette) { timeWarpVignette.remove(); timeWarpVignette = null; }
    }
  }
  return rawDt * timeWarpState.factor;
}

// ═══════════════════════════════════════════════════════════
//  CARRYING STATE & DUST THROTTLE

let carriedPlatform = null;
let dustTrailTimer = 0;

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function executeJump() {
  const phys = configs.physics;
  playerState.vy = phys.movement.jumpVelocity;
  playerState.grounded = false;
  playerState.coyoteTimer = 0;
  playerState.jumpBuffer = 0;
  playerState.jumping = true;
  playerState.jumpRising = true;

  if (carriedPlatform) { carriedPlatform.userData.carrying = false; carriedPlatform = null; }

  if (configs.particles.interactiveFX.enabled) {
    for (const inter of interactives) {
      if (inter.userData.flyingAway) continue;
      const dx = Math.abs(player.position.x - inter.position.x);
      const dy = Math.abs(player.position.y - inter.position.y);
      if (dx < 2 && dy < 2) {
        inter.userData.flyingAway = true;
        inter.visible = false;
        createBird(inter.position.x, inter.position.y);
        spawnBirdEffect(inter.position.x, inter.position.y);
        break;
      }
    }
  }

  const pSize = phys.movement.playerSize;
  spawnDustBurst(player.position.x, player.position.y - pSize / 2);

  if (configs.atmosphere.timeWarp.triggerOn === 'jump') triggerTimeWarp();
}

function update() {
  const rawDt = Math.min(clock.getDelta(), 0.05);
  const dt = updateTimeWarp(rawDt);

  const phys = configs.physics;
  const eCfg = configs.entities;
  const pSize = phys.movement.playerSize;

  // ─ Damage cooldown ─
  if (playerState.damageCooldown > 0) playerState.damageCooldown -= dt;
  if (playerState.hurtFlash > 0) {
    playerState.hurtFlash -= dt;
    player.material = (Math.sin(playerState.hurtFlash * 30) > 0) ? matPlayerHurt : matPlayer;
    if (playerState.hurtFlash <= 0) player.material = matPlayer.clone();
  }

  // ─ Animate entities ─
  for (const obs of obstacles) {
    if (!obs.userData.surprised) {
      obs.position.y = obs.userData.baseY + Math.sin(clock.elapsedTime * eCfg.passive.bobSpeed + obs.position.x) * eCfg.passive.bobHeight;
    }
  }
  for (const ene of enemies) {
    if (!ene.userData.surprised) {
      ene.position.y = ene.userData.baseY + Math.sin(clock.elapsedTime * eCfg.harmful.bobSpeed + ene.position.x) * eCfg.harmful.bobHeight;
      ene.rotation.z = Math.sin(clock.elapsedTime * eCfg.harmful.wobbleSpeed + ene.position.x) * eCfg.harmful.wobbleAngle;
      ene.material.emissiveIntensity = eCfg.harmful.emissiveBase + Math.sin(clock.elapsedTime * eCfg.harmful.pulseSpeed) * eCfg.harmful.emissivePulse;
    }
  }
  for (const inter of interactives) {
    if (!inter.userData.flyingAway && !inter.userData.carrying) {
      inter.position.y = inter.userData.originalY + Math.sin(clock.elapsedTime * eCfg.interactive.floatSpeed + inter.position.x * 0.5) * eCfg.interactive.floatHeight;
      if (inter.userData.lightOn) {
        inter.material.emissiveIntensity = eCfg.interactive.glowIntensity + Math.sin(clock.elapsedTime * eCfg.interactive.glowPulseSpeed) * eCfg.interactive.glowPulseDelta;
      }
    }
  }

  // ─ Input ─
  playerState.vx = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) playerState.vx = -phys.movement.speed;
  if (keys['ArrowRight'] || keys['KeyD']) playerState.vx = phys.movement.speed;

  if (justPressed['Space'] || justPressed['ArrowUp']) playerState.jumpBuffer = phys.movement.jumpBuffer;
  for (const k in justPressed) justPressed[k] = false;

  if (playerState.grounded) { playerState.coyoteTimer = phys.movement.coyoteTime; }
  else { playerState.coyoteTimer -= dt; }
  playerState.jumpBuffer -= dt;

  if (playerState.jumpBuffer > 0 && playerState.coyoteTimer > 0) executeJump();

  // ─ Gravity ─
  playerState.vy += phys.movement.gravity * dt;
  if (playerState.jumping && playerState.vy < 0) playerState.jumpRising = false;

  playerState.prevY = player.position.y;

  // ─ Move player ─
  player.position.x += playerState.vx * dt;
  player.position.y += playerState.vy * dt;

  if (carriedPlatform && carriedPlatform.userData.carrying) {
    player.position.x = carriedPlatform.position.x;
    player.position.y = carriedPlatform.position.y + carriedPlatform.userData.h / 2 + pSize / 2;
  }

  // ─ Collision ─
  playerState.grounded = false;

  // Ground
  if (player.position.y - pSize / 2 <= GROUND_Y) {
    const wasAirborne = playerState.vy < -1;
    player.position.y = GROUND_Y + pSize / 2;
    if (playerState.vy < 0) {
      if (wasAirborne) spawnDustBurst(player.position.x, GROUND_Y);
      playerState.vy = 0;
      playerState.jumping = false;
      playerState.jumpRising = false;
    }
    playerState.grounded = true;
    if (carriedPlatform) { carriedPlatform.userData.carrying = false; carriedPlatform = null; }
  }

  // ─ Dust trail while grounded ─
  if (playerState.grounded && Math.abs(playerState.vx) > 0) {
    dustTrailTimer += dt;
    if (dustTrailTimer >= configs.particles.dustTrail.spawnInterval) {
      dustTrailTimer = 0;
      spawnDustTrail(player.position.x, player.position.y - pSize / 2);
    }
  } else if (!playerState.grounded) {
    dustTrailTimer = 0;
  }

  // ─ Passive enemies ─
  for (const obs of obstacles) {
    const ow = obs.userData.w, oh = obs.userData.h;
    const obsActualY = obs.position.y;
    if (boxOverlap(player.position.x, player.position.y, pSize * 0.9, pSize, obs.position.x, obsActualY, ow, oh)) {
      const obsTop = obsActualY + oh / 2;
      if (playerState.vy <= 0 && isLandingOnTop(playerState.prevY, obsActualY, oh)) {
        player.position.y = obsTop + pSize / 2;
        if (playerState.vy < -2 && !obs.userData.surprised) {
          spawnEnemyLandFX(obs.position.x, obsTop);
          obs.userData.surprised = true;
          obs.scale.y = eCfg.passive.squashOnLand.scaleY;
          obs.scale.x = eCfg.passive.squashOnLand.scaleX;
          setTimeout(() => { obs.scale.y = 1; obs.scale.x = 1; obs.userData.surprised = false; }, eCfg.passive.squashOnLand.recoverMs);
          if (configs.atmosphere.timeWarp.triggerOn === 'enemyLand') triggerTimeWarp();
        }
        playerState.vy = 0;
        playerState.grounded = true;
        playerState.jumping = false;
        if (Math.abs(playerState.vx) > 0) {
          dustTrailTimer += dt;
          if (dustTrailTimer >= configs.particles.dustTrail.spawnInterval) {
            dustTrailTimer = 0;
            spawnDustTrail(player.position.x, obsTop);
          }
        }
      } else {
        if (player.position.x < obs.position.x) player.position.x = obs.position.x - ow / 2 - pSize / 2;
        else player.position.x = obs.position.x + ow / 2 + pSize / 2;
      }
    }
  }

  // ─ Harmful enemies ─
  for (const ene of enemies) {
    const ew = ene.userData.w, eh = ene.userData.h;
    const eneActualY = ene.position.y;
    if (boxOverlap(player.position.x, player.position.y, pSize * 0.9, pSize, ene.position.x, eneActualY, ew, eh)) {
      const eneTop = eneActualY + eh / 2;
      if (playerState.vy <= 0 && isLandingOnTop(playerState.prevY, eneActualY, eh)) {
        player.position.y = eneTop + pSize / 2;
        if (!ene.userData.surprised) {
          spawnEnemyLandFX(ene.position.x, eneTop);
          ene.userData.surprised = true;
          ene.scale.y = eCfg.harmful.squashOnLand.scaleY;
          ene.scale.x = eCfg.harmful.squashOnLand.scaleX;
          setTimeout(() => { ene.scale.y = 1; ene.scale.x = 1; ene.userData.surprised = false; }, eCfg.harmful.squashOnLand.recoverMs);
          if (configs.atmosphere.timeWarp.triggerOn === 'enemyLand') triggerTimeWarp();
        }
        playerState.vy = phys.movement.jumpVelocity * phys.health.bounceMultiplier;
        playerState.grounded = false;
        playerState.jumping = true;
      } else {
        if (playerState.damageCooldown <= 0) {
          playerState.hp--;
          playerState.damageCooldown = phys.health.damageCooldown;
          playerState.hurtFlash = phys.health.hurtFlashDuration;
          updateHealthUI();
          spawnDamageEffect(player.position.x, player.position.y);
          const knockDir = player.position.x < ene.position.x ? -1 : 1;
          player.position.x += knockDir * phys.health.knockbackForce;
          playerState.vy = 6;
          if (configs.atmosphere.timeWarp.triggerOn === 'damage') triggerTimeWarp();
        }
        if (player.position.x < ene.position.x) player.position.x = ene.position.x - ew / 2 - pSize / 2;
        else player.position.x = ene.position.x + ew / 2 + pSize / 2;
      }
    }
  }

  // ─ Interactives ─
  for (const inter of interactives) {
    if (inter.userData.flyingAway) continue;
    const iw = inter.userData.w, ih = inter.userData.h;
    if (boxOverlap(player.position.x, player.position.y, pSize * 0.9, pSize, inter.position.x, inter.position.y, iw, ih)) {
      const interTop = inter.position.y + ih / 2;
      if (playerState.vy <= 0 && isLandingOnTop(playerState.prevY, inter.position.y, ih)) {
        player.position.y = interTop + pSize / 2;
        playerState.vy = 0;
        playerState.grounded = true;
        playerState.jumping = false;
        if (configs.particles.interactiveFX.enabled && !inter.userData.carrying) {
          inter.userData.carrying = true;
          carriedPlatform = inter;
          inter.scale.y = 0.8; inter.scale.x = 1.2;
          spawnDustBurst(inter.position.x, inter.position.y - ih / 2);
        }
      } else if (Math.abs(playerState.vx) > 0) {
        if (configs.particles.interactiveFX.enabled) {
          inter.userData.lightOn = !inter.userData.lightOn;
          if (inter.userData.lightOn) {
            inter.material.emissive.setHex(0xfeca57);
            inter.material.emissiveIntensity = eCfg.interactive.glowIntensity;
          } else {
            inter.material.emissive.setHex(0x000000);
            inter.material.emissiveIntensity = 0;
          }
          spawnLightToggle(inter.position.x, inter.position.y, inter.userData.lightOn);
        }
        if (player.position.x < inter.position.x) player.position.x = inter.position.x - iw / 2 - pSize / 2;
        else player.position.x = inter.position.x + iw / 2 + pSize / 2;
      }
    }
  }

  // ─ Buffered jump ─
  if (playerState.grounded && playerState.jumpBuffer > 0) executeJump();

  // ─ Carrying ─
  if (carriedPlatform && carriedPlatform.userData.carrying) {
    carriedPlatform.position.x += playerState.vx * dt * eCfg.interactive.carrySpeedFactor;
    carriedPlatform.position.y = carriedPlatform.userData.originalY + Math.sin(clock.elapsedTime * 3) * 0.15;
    carriedPlatform.scale.y += (1 - carriedPlatform.scale.y) * 0.1;
    carriedPlatform.scale.x += (1 - carriedPlatform.scale.x) * 0.1;
  }

  // ─ Player visual (squash & stretch) ─
  const ss = phys.squashStretch;
  if (ss.enabled) {
    if (playerState.grounded) {
      const squash = 1 + Math.abs(playerState.vx) * ss.groundSquash;
      player.scale.x = 1 / squash; player.scale.y = squash;
    } else {
      const stretch = 1 + Math.abs(playerState.vy) * ss.airStretch;
      player.scale.y = stretch; player.scale.x = 1 / stretch;
    }
    player.rotation.z = -playerState.vx * ss.tiltAmount;
  } else {
    player.scale.set(1, 1, 1);
    player.rotation.z = 0;
  }

  // ─ Screen shake ─
  const camCfg = configs.camera;
  if (screenShake > 0) {
    screenShake -= dt;
    const intensity = screenShake * camCfg.screenShake.intensity;
    threeCamera.position.x += (player.position.x - threeCamera.position.x) * camCfg.view.followSmoothing + (Math.random() - 0.5) * intensity;
    threeCamera.position.y = cameraBasePos.y + (Math.random() - 0.5) * intensity;
  } else {
    threeCamera.position.x += (player.position.x - threeCamera.position.x) * camCfg.view.followSmoothing;
    threeCamera.position.y = cameraBasePos.y;
  }

  // ─ Update systems ─
  updateParticles(dt);
  updateBirds(dt);
  updateWeather(dt);
  updateGhosts();

  renderer.render(scene, threeCamera);
  requestAnimationFrame(update);
}

// ═══════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const gw = getGameWidth();
  const gh = window.innerHeight;
  renderer.setSize(gw, gh);
  aspect = gw / gh;
  applyCameraConfig();
});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
await loadConfigs();
buildPanel();
syncPanelFromConfig();
rebuildStars();
generateLevel();
initGhosts();
update();
</script>
</body>
</html>
