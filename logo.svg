<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6F2FF"/>
      <stop offset="100%" stop-color="#F5F7FA"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A3D"/>
      <stop offset="100%" stop-color="#E85D1A"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A9FD4"/>
      <stop offset="100%" stop-color="#3B7CB8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C5F8A" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#BDD5EA" stroke-width="3"/>

  <!-- Keyboard base -->
  <rect x="96" y="220" width="320" height="180" rx="16" ry="16" fill="url(#frameGrad)" filter="url(#shadow)"/>
  <rect x="104" y="228" width="304" height="164" rx="12" ry="12" fill="#E8F0F8" stroke="#B0C8DE" stroke-width="1.5"/>

  <!-- Keyboard keys - Row 1 (WASD area + others) -->
  <!-- Q -->
  <rect x="118" y="242" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- W - highlighted -->
  <rect x="160" y="242" width="36" height="32" rx="5" fill="url(#keyGrad)" stroke="#2E6BA6" stroke-width="1.5"/>
  <text x="178" y="264" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">W</text>
  <!-- E -->
  <rect x="202" y="242" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- R -->
  <rect x="244" y="242" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- T -->
  <rect x="286" y="242" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- Y -->
  <rect x="328" y="242" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- U -->
  <rect x="370" y="242" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>

  <!-- Keyboard keys - Row 2 -->
  <!-- A - highlighted -->
  <rect x="128" y="280" width="36" height="32" rx="5" fill="url(#keyGrad)" stroke="#2E6BA6" stroke-width="1.5"/>
  <text x="146" y="302" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">A</text>
  <!-- S - highlighted -->
  <rect x="170" y="280" width="36" height="32" rx="5" fill="url(#keyGrad)" stroke="#2E6BA6" stroke-width="1.5"/>
  <text x="188" y="302" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">S</text>
  <!-- D - highlighted -->
  <rect x="212" y="280" width="36" height="32" rx="5" fill="url(#keyGrad)" stroke="#2E6BA6" stroke-width="1.5"/>
  <text x="230" y="302" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">D</text>
  <!-- F -->
  <rect x="254" y="280" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- G -->
  <rect x="296" y="280" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- H -->
  <rect x="338" y="280" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>

  <!-- Keyboard keys - Row 3 -->
  <!-- Z -->
  <rect x="148" y="318" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- X -->
  <rect x="190" y="318" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- C -->
  <rect x="232" y="318" width="36" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <!-- Space Bar -->
  <rect x="274" y="318" width="110" height="32" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>

  <!-- Row 3 extra -->
  <rect x="118" y="356" width="74" height="28" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <rect x="198" y="356" width="130" height="28" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>
  <rect x="334" y="356" width="74" height="28" rx="5" fill="#D4E2F0" stroke="#A8BDD0" stroke-width="1"/>

  <!-- Animation motion arcs radiating from W key (upward) -->
  <path d="M178 230 Q178 190 150 160" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M178 230 Q178 185 178 150" fill="none" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round" opacity="1"/>
  <path d="M178 230 Q178 190 206 160" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- Small motion dots -->
  <circle cx="150" cy="155" r="4" fill="#FF7A3D" opacity="0.85"/>
  <circle cx="178" cy="145" r="5" fill="#FF6020" opacity="1"/>
  <circle cx="206" cy="155" r="4" fill="#FF7A3D" opacity="0.85"/>

  <!-- Motion lines from A key (left) -->
  <path d="M122 296 Q100 296 82 296" fill="none" stroke="#FF7A3D" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="78" cy="296" r="3.5" fill="#FF7A3D" opacity="0.7"/>

  <!-- Motion lines from D key (right) -->
  <path d="M254 296 Q272 296 290 296" fill="none" stroke="#FF7A3D" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="294" cy="296" r="3.5" fill="#FF7A3D" opacity="0.7"/>

  <!-- Small animated player figure above the keys -->
  <g transform="translate(178, 120)" filter="url(#glow)">
    <!-- Body -->
    <rect x="-8" y="-4" width="16" height="20" rx="3" fill="url(#accentGrad)"/>
    <!-- Head -->
    <circle cx="0" cy="-10" r="7" fill="url(#accentGrad)"/>
    <!-- Left leg angled (running) -->
    <line x1="-4" y1="16" x2="-10" y2="28" stroke="#E85D1A" stroke-width="3" stroke-linecap="round"/>
    <!-- Right leg angled (running) -->
    <line x1="4" y1="16" x2="10" y2="28" stroke="#E85D1A" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Title arc text substitute: "MAP" left, "ANIM" right -->
  <text x="340" y="180" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#2C5F8A" text-anchor="middle" letter-spacing="3" opacity="0.9">MAP</text>
  <text x="340" y="210" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#5A9FD4" text-anchor="middle" letter-spacing="5" opacity="0.8">ANIMATION</text>
</svg>
